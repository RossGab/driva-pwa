name: Trigger Snapshot

on:
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger snapshot repo
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.SNAPSHOT_TRIGGER_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/RossGab/driva-task-snapshots/actions/workflows/snapshot-today.yml/dispatches \
          -d '{"ref":"main","inputs":{"force_run":"1"}}'
