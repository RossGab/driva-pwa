<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Task Viewer Config</title>

<style>

/* ===== GLOBAL ===== */
body {
  display:none;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background:#f5f7fb;
  padding:12px;
  color:#333;
}

h2 {
  margin-bottom:12px;
}

/* ===== CARD ===== */
.box {
  background:#fff;
  padding:16px;
  border-radius:12px;
  margin-bottom:14px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

/* ===== INPUT GROUP ===== */
.row {
  display:flex;
  gap:8px;
  margin-bottom:10px;
}

input, select {
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
  font-size:14px;
  flex:1;
}

/* ===== BUTTONS ===== */
button {
  padding:10px 14px;
  border-radius:8px;
  border:none;
  font-size:14px;
  cursor:pointer;
}

.btn-primary {
  background:#2563eb;
  color:#fff;
}

.btn-primary:hover {
  background:#1d4ed8;
}

.btn-danger {
  background:#ef4444;
  color:#fff;
}

.btn-danger:hover {
  background:#dc2626;
}

.btn-small {
  padding:6px 10px;
  font-size:12px;
}

/* ===== BA LIST (MANAGE) ===== */
.ba-item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  border-bottom:1px solid #eee;
}

/* ===== BA CHIP STYLE ===== */
#baList {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}

.ba-chip {
  padding:8px 14px;
  border-radius:20px;
  border:1px solid #ddd;
  background:#f8fafc;
  cursor:pointer;
  font-size:13px;
  transition:0.2s;
}

/* hover */
.ba-chip:hover {
  background:#e2e8f0;
}

/* selected */
.ba-chip.active {
  background:#2563eb;
  color:#fff;
  border-color:#2563eb;
}
  
</style>
</head>

<body>

<h2>Task Viewer Config v1.3.16</h2>

<!-- ===== BA MANAGEMENT ===== -->
<div class="box">
  <h3>Manage BA</h3>

  <div class="row">
    <input id="newBA" placeholder="Enter BA name">
    <button class="btn-primary" onclick="addBA()">+ Add</button>
  </div>

  <div id="baManageList"></div>
</div>

<!-- ===== ADD USER ===== -->
<div class="box">
  <h3>Add User</h3>

  <div class="row">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
  </div>

  <div class="row">
    <select id="role">
      <option value="admin">Admin</option>
      <option value="viewer">Viewer</option>
    </select>
  </div>

  <div style="margin-top:12px;">
    <b>Select BA</b>

    <!-- SELECT ALL -->
    <label style="display:flex;align-items:center;gap:10px;margin-top:8px;padding:10px 12px;">
      <input type="checkbox" id="selectAllBA">
      <span>Select All</span>
    </label>

    <div id="baList"></div>
  </div>

  <button class="btn-primary" onclick="addUser(event)" style="margin-top:10px;width:100%;">
    Create User
  </button>
</div>

<!-- ===== USERS ===== -->
<div class="box">
  <h3>Users</h3>
  <div id="userList"></div>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get, update, remove, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-functions.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDFW61pnwLvh6HGKWt10zLYNr860fI8vkg",
  authDomain: "driva-pwa.firebaseapp.com",
  databaseURL: "https://driva-pwa-default-rtdb.firebaseio.com",
  projectId: "driva-pwa"
};

const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const functions = getFunctions(app, "us-central1");
const createUserFn = httpsCallable(functions, "createTaskViewerUser");

/* AUTH */
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login-taskview.html";
    return;
  }

  const email = (user.email || "").toLowerCase();
  const snap = await get(ref(db, "config/taskviewUsers/admin"));
  const admins = snap.val() || {};

  const isAdmin = Object.values(admins)
    .some(u => u.email === email && u.active);

  if (!isAdmin) {
    alert("Admins only");
    window.location.href = "taskview.html";
    return;
  }

  document.body.style.display = "block";

  loadUsers();
  loadBAOptions();
  loadBAManageList();
});

/* ===== BA ===== */
window.addBA = async function () {
  const input = document.getElementById("newBA");
  const ba = input.value.trim().toUpperCase();

  if (!ba) return alert("Enter BA");

  await set(ref(db, `config/baList/${ba}`), true);
  input.value = "";

  loadBAOptions();
  loadBAManageList();
};

window.deleteBA = async function (ba) {
  if (!confirm(`Delete ${ba}?`)) return;

  await remove(ref(db, `config/baList/${ba}`));

  loadBAOptions();
  loadBAManageList();
};

async function loadBAManageList() {
  const snap = await get(ref(db, "config/baList"));
  const data = snap.val() || {};

  const container = document.getElementById("baManageList");
  container.innerHTML = "";

  Object.keys(data).sort().forEach(ba => {
    const div = document.createElement("div");
    div.className = "ba-item";

    div.innerHTML = `
      <span>${ba}</span>
      <button class="btn-danger btn-small" onclick="deleteBA('${ba}')">Delete</button>
    `;

    container.appendChild(div);
  });
}

async function loadBAOptions() {
  const snap = await get(ref(db, "config/baList"));
  const data = snap.val() || {};

  const container = document.getElementById("baList");
  container.innerHTML = "";

  Object.keys(data).sort().forEach(ba => {

    const chip = document.createElement("div");
    chip.className = "ba-chip";
    chip.innerText = ba;

    chip.onclick = () => {
      chip.classList.toggle("active");
    };

    container.appendChild(chip);
  });

  // SELECT ALL
  document.getElementById("selectAllBA").onchange = function () {
    document.querySelectorAll(".ba-chip").forEach(chip => {
      chip.classList.toggle("active", this.checked);
    });
  };
}

/* ===== ADD USER ===== */
window.addUser = async function (event) {
  const btn = event.target;
  btn.disabled = true;
  btn.innerText = "Creating...";

  const user = auth.currentUser;
  if (!user) {
    alert("Not logged in");
    return;
  }

  await user.getIdToken(); // ✅ FIXED

  const email = document.getElementById("email").value.trim().toLowerCase();
  const password = document.getElementById("password").value.trim();
  const role = document.getElementById("role").value;

  const ba = Array.from(
  document.querySelectorAll(".ba-chip.active")
).map(el => el.innerText);

  if (!email || !password) {
    alert("Missing fields");
    return;
  }

  try {
    await createUserFn({ email, password, role, ba });

    alert("✅ User created");
    loadUsers();

  } catch (e) {
    console.error(e);
    alert("❌ Failed to create user");
  }

  btn.disabled = false;
  btn.innerText = "Create User";
};

/* ===== USERS ===== */
async function loadUsers() {
  const snap = await get(ref(db, "config/taskviewUsers"));
  const data = snap.val() || {};

  const container = document.getElementById("userList");
  container.innerHTML = "";

  ["admin","viewer"].forEach(role => {
    const users = data[role] || {};

    Object.values(users).forEach(u => {
      const div = document.createElement("div");
      div.className = "user-item";

      div.innerHTML = `
        <b>${u.email}</b> (${role})<br>
        <small>BA: ${(u.ba || []).join(", ") || "ALL"}</small>
      `;

      container.appendChild(div);
    });
  });
}

</script>

</body>
</html>
