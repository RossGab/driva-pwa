<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Task Viewer Config</title>

<style>
body {
  display:none;
  font-family: Arial;
  background:#f3f3f3;
  padding:10px;
}

.box {
  background:#fff;
  padding:15px;
  border-radius:8px;
  margin-bottom:10px;
}

input, select, button {
  padding:8px;
  margin:5px 0;
}

#baList {
  max-height:150px;
  overflow-y:auto;
  border:1px solid #ddd;
  padding:8px;
  border-radius:6px;
  margin-top:5px;
}
</style>
</head>

<body>

<h2>Task Viewer Config v1.3.4</h2>

<!-- ========================= -->
<!-- 🔥 BA MANAGEMENT -->
<!-- ========================= -->
<div class="box">
  <h3>Manage BA</h3>

  <input id="newBA" placeholder="Enter BA name">
  <button onclick="addBA()">➕ Add BA</button>

  <div id="baManageList" style="margin-top:10px;"></div>
</div>

<!-- ========================= -->
<!-- 👤 ADD USER -->
<!-- ========================= -->
<div class="box">
  <h3>Add User</h3>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <select id="role">
    <option value="admin">Admin</option>
    <option value="viewer">Viewer</option>
  </select>

  <div style="margin-top:10px;">
    <b>Select BA</b>

    <label style="display:block;">
      <input type="checkbox" id="selectAllBA"> Select All
    </label>

    <div id="baList"></div>
  </div>

  <button onclick="addUser()">Add</button>
</div>

<!-- ========================= -->
<!-- 📋 USERS -->
<!-- ========================= -->
<div class="box">
  <h3>Users</h3>
  <div id="userList"></div>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-functions.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDFW61pnwLvh6HGKWt10zLYNr860fI8vkg",
  authDomain: "driva-pwa.firebaseapp.com",
  databaseURL: "https://driva-pwa-default-rtdb.firebaseio.com",
  projectId: "driva-pwa"
};

const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const functions = getFunctions(app, "us-central1");
const createUserFn = httpsCallable(functions, "createTaskViewerUser");

/* 🔐 AUTH + ADMIN CHECK */
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login-taskview.html";
    return;
  }

  const email = (user.email || "").toLowerCase();

  const snap = await get(ref(db, "config/taskviewUsers/admin"));
  const admins = snap.val() || {};

  const isAdmin = Object.values(admins)
    .some(u => u.email === email && u.active);

  if (!isAdmin) {
    alert("Admins only");
    window.location.href = "taskview.html";
    return;
  }

  document.body.style.display = "block";

  loadUsers();
  loadBAOptions();
  loadBAManageList();
});

/* ========================= */
/* 🔥 BA MANAGEMENT */
/* ========================= */

window.addBA = async function () {
  const input = document.getElementById("newBA");
  const ba = input.value.trim().toUpperCase();

  if (!ba) {
    alert("Enter BA name");
    return;
  }

  await update(ref(db, `config/baList/${ba}`), true);

  input.value = "";

  loadBAOptions();
  loadBAManageList();
};

window.deleteBA = async function (ba) {

  if (!confirm(`Delete BA "${ba}"?`)) return;

  try {
    await remove(ref(db, `config/baList/${ba}`)); // ✅ FIXED

    loadBAOptions();
    loadBAManageList();

  } catch (err) {
    console.error(err);
    alert("Failed to delete BA");
  }
};

async function loadBAManageList() {
  const snap = await get(ref(db, "config/baList"));
  const data = snap.val() || {};

  const container = document.getElementById("baManageList");
  container.innerHTML = "";

  Object.keys(data).sort().forEach(ba => {

    const div = document.createElement("div");
    div.style.padding = "6px";
    div.style.borderBottom = "1px solid #eee";

    div.innerHTML = `
      ${ba}
      <button onclick="deleteBA('${ba}')"
        style="float:right;background:#e74c3c;color:#fff;border:none;">
        ❌
      </button>
    `;

    container.appendChild(div);
  });
}

/* ========================= */
/* 🔥 LOAD BA OPTIONS */
/* ========================= */

async function loadBAOptions() {
  const snap = await get(ref(db, "config/baList"));
  const data = snap.val() || {};

  const container = document.getElementById("baList");
  container.innerHTML = "";

  Object.keys(data).sort().forEach(ba => {
    const label = document.createElement("label");
    label.style.display = "block";

    label.innerHTML = `
      <input type="checkbox" value="${ba}">
      ${ba}
    `;

    container.appendChild(label);
  });

  document.getElementById("selectAllBA").onchange = function () {
    document.querySelectorAll("#baList input").forEach(cb => {
      cb.checked = this.checked;
    });
  };
}

/* ========================= */
/* ➕ ADD USER */
/* ========================= */

window.addUser = async function () {

  const user = auth.currentUser;

  if (!user) {
    alert("Not logged in");
    return;
  }

  await user.getIdToken(true);

  const email = document.getElementById("email").value.trim().toLowerCase();
  const password = document.getElementById("password").value.trim();
  const role = document.getElementById("role").value;

  const ba = Array.from(
    document.querySelectorAll("#baList input:checked")
  ).map(el => el.value);

  if (!email || !password) {
    alert("Enter email and password");
    return;
  }

  try {
    await createUserFn({
      email,
      password,
      role,
      ba
    });

    alert("✅ User created (Auth + DB)");

    document.getElementById("email").value = "";
    document.getElementById("password").value = "";

    document.querySelectorAll("#baList input").forEach(cb => cb.checked = false);
    document.getElementById("selectAllBA").checked = false;

    loadUsers();

  } catch (e) {
    console.error("Function error:", e);
    alert("❌ " + (e.message || "Error creating user"));
  }
};

/* ========================= */
/* 📋 LOAD USERS */
/* ========================= */

async function loadUsers() {
  const snap = await get(ref(db, "config/taskviewUsers"));
  const data = snap.val() || {};

  const container = document.getElementById("userList");
  container.innerHTML = "";

  ["admin", "viewer"].forEach(role => {
    const users = data[role] || {};

    Object.entries(users).forEach(([key, u]) => {

      const div = document.createElement("div");
      div.style.padding = "6px";
      div.style.borderBottom = "1px solid #eee";

      div.innerHTML = `
        <b>${u.email}</b> (${role})<br>
        <small>BA: ${(u.ba || []).join(", ") || "ALL"}</small>
        <br>
        <button onclick="toggle('${role}','${key}',${u.active})">
          ${u.active ? "Deactivate" : "Activate"}
        </button>
      `;

      container.appendChild(div);
    });
  });
}

/* 🔄 TOGGLE ACTIVE */
window.toggle = async function(role, key, current) {
  await update(ref(db, `config/taskviewUsers/${role}/${key}`), {
    active: !current
  });

  loadUsers();
};

</script>

</body>
</html>
