<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Task Viewer Config</title>

<style>

/* ===== GLOBAL ===== */
body {
  display:none;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background:#f5f7fb;
  padding:12px;
  color:#333;
}

h2 {
  margin-bottom:12px;
}

/* ===== CARD ===== */
.box {
  background:#fff;
  padding:16px;
  border-radius:12px;
  margin-bottom:14px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

/* ===== INPUT GROUP ===== */
.row {
  display:flex;
  gap:8px;
  margin-bottom:10px;
}

input, select {
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
  font-size:14px;
  flex:1;
}

/* ===== BUTTONS ===== */
button {
  padding:10px 14px;
  border-radius:8px;
  border:none;
  font-size:14px;
  cursor:pointer;
}

.btn-primary {
  background:#2563eb;
  color:#fff;
}

.btn-primary:hover {
  background:#1d4ed8;
}

.btn-danger {
  background:#ef4444;
  color:#fff;
}

.btn-danger:hover {
  background:#dc2626;
}

.btn-small {
  padding:6px 10px;
  font-size:12px;
}

/* ===== BA LIST (MANAGE) ===== */
.ba-item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  border-bottom:1px solid #eee;
  font-size:14px;
}

/* ===== BA CHECKBOX LIST (FIXED ROWS) ===== */
#baList {
  max-height:160px;
  overflow-y:auto;
  border:1px solid #eee;
  border-radius:8px;
  margin-top:6px;
}

#baList label {
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-bottom:1px solid #f1f5f9;
  cursor:pointer;
}

#baList label:last-child {
  border-bottom:none;
}

#baList label:hover {
  background:#f8fafc;
}

/* ===== USER LIST ===== */
.user-item {
  padding:10px;
  border-bottom:1px solid #eee;
}

.user-item small {
  color:#666;
}

</style>
</head>

<body>

<h2>Task Viewer Config v1.3.9</h2>

<!-- ========================= -->
<!-- 🔥 BA MANAGEMENT -->
<!-- ========================= -->
<div class="box">
  <h3>Manage BA</h3>

  <div class="row">
    <input id="newBA" placeholder="Enter BA name">
    <button class="btn-primary" onclick="addBA()">+ Add</button>
  </div>

  <div id="baManageList"></div>
</div>

<!-- ========================= -->
<!-- 👤 ADD USER -->
<!-- ========================= -->
<div class="box">
  <h3>Add User</h3>

  <div class="row">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
  </div>

  <div class="row">
    <select id="role">
      <option value="admin">Admin</option>
      <option value="viewer">Viewer</option>
    </select>
  </div>

  <div style="margin-top:12px;">
    <b>Select BA</b>

    <label style="display:block;margin-top:6px;">
      <input type="checkbox" id="selectAllBA"> Select All
    </label>

    <div id="baList"></div>
  </div>

  <button class="btn-primary" onclick="addUser()" style="margin-top:10px;width:100%;">
    Create User
  </button>
</div>

<!-- ========================= -->
<!-- 📋 USERS -->
<!-- ========================= -->
<div class="box">
  <h3>Users</h3>
  <div id="userList"></div>
</div>
