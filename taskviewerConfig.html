<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Task Viewer Config</title>

<style>
body {
  display:none;
  font-family: Arial;
  background:#f3f3f3;
  padding:10px;
}

.box {
  background:#fff;
  padding:15px;
  border-radius:8px;
  margin-bottom:10px;
}

input, select, button {
  padding:8px;
  margin:5px 0;
}
</style>
</head>

<body>

<h2>Task Viewer Config</h2>

<div class="box">
  <h3>Add User</h3>
  <input id="email" placeholder="Email">
  <select id="role">
    <option value="admin">Admin</option>
    <option value="viewer">Viewer</option>
  </select>
  <button onclick="addUser()">Add</button>
</div>

<div class="box">
  <h3>Users</h3>
  <div id="userList"></div>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get, push, set, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDFW61pnwLvh6HGKWt10zLYNr860fI8vkg",
  authDomain: "driva-pwa.firebaseapp.com",
  databaseURL: "https://driva-pwa-default-rtdb.firebaseio.com"
};

const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

/* 🔐 AUTH + ADMIN CHECK */
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login-taskview.html";
    return;
  }

  const email = (user.email || "").toLowerCase();

  const snap = await get(ref(db, "config/taskviewUsers/admin"));
  const admins = snap.val() || {};

  const isAdmin = Object.values(admins)
    .some(u => u.email === email && u.active);

  if (!isAdmin) {
    alert("Admins only");
    window.location.href = "taskview.html";
    return;
  }

  document.body.style.display = "block";

  loadUsers();
});

/* ➕ ADD USER */
window.addUser = async function () {
  const email = document.getElementById("email").value.trim().toLowerCase();
  const role = document.getElementById("role").value;

  if (!email) {
    alert("Enter email");
    return;
  }

  const newRef = push(ref(db, `config/taskviewUsers/${role}`));

  await set(newRef, {
    email,
    active: true,
    createdAt: Date.now()
  });

  alert("User added");

  document.getElementById("email").value = "";

  loadUsers();
};

/* 📋 LOAD USERS */
async function loadUsers() {
  const snap = await get(ref(db, "config/taskviewUsers"));
  const data = snap.val() || {};

  const container = document.getElementById("userList");
  container.innerHTML = "";

  ["admin", "viewer"].forEach(role => {
    const users = data[role] || {};

    Object.entries(users).forEach(([key, u]) => {

      const div = document.createElement("div");
      div.style.padding = "6px";
      div.style.borderBottom = "1px solid #eee";

      div.innerHTML = `
        <b>${u.email}</b> (${role})
        <button onclick="toggle('${role}','${key}',${u.active})">
          ${u.active ? "Deactivate" : "Activate"}
        </button>
      `;

      container.appendChild(div);
    });
  });
}

/* 🔄 TOGGLE ACTIVE */
window.toggle = async function(role, key, current) {
  await update(ref(db, `config/taskviewUsers/${role}/${key}`), {
    active: !current
  });

  loadUsers();
};

</script>

</body>
</html>
