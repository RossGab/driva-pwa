<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Task Viewer Config</title>

<style>
body {
  display:none;
  font-family: Arial;
  background:#f3f3f3;
  padding:10px;
}

.box {
  background:#fff;
  padding:15px;
  border-radius:8px;
  margin-bottom:10px;
}

input, select, button {
  padding:8px;
  margin:5px 0;
}
</style>
</head>

<body>

<h2>Task Viewer Config v1.0.4</h2>

<div class="box">
  <h3>Add User</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <select id="role">
    <option value="admin">Admin</option>
    <option value="viewer">Viewer</option>
  </select>
  <button onclick="addUser()">Add</button>
</div>

<div class="box">
  <h3>Users</h3>
  <div id="userList"></div>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-functions.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDFW61pnwLvh6HGKWt10zLYNr860fI8vkg",
  authDomain: "driva-pwa.firebaseapp.com",
  databaseURL: "https://driva-pwa-default-rtdb.firebaseio.com",
  projectId: "driva-pwa"
};

const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

const functions = getFunctions(app, "us-central1");
const createUserFn = httpsCallable(functions, "createTaskViewerUser");

import { connectFunctionsEmulator } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-functions.js";

// ❗ ONLY FOR DEBUG (remove in production)
// connectFunctionsEmulator(functions, "localhost", 5001);



/* 🔐 AUTH + ADMIN CHECK */
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login-taskview.html";
    return;
  }

  const email = (user.email || "").toLowerCase();

  const snap = await get(ref(db, "config/taskviewUsers/admin"));
  const admins = snap.val() || {};

  const isAdmin = Object.values(admins)
    .some(u => u.email === email && u.active);

  if (!isAdmin) {
    alert("Admins only");
    window.location.href = "taskview.html";
    return;
  }

  document.body.style.display = "block";

  loadUsers();
});

window.addUser = async function () {

  const user = auth.currentUser;

  if (!user) {
    alert("Not logged in");
    return;
  }

  // 🔥 FORCE TOKEN (THIS IS THE FIX)
  await user.getIdToken(true);

  const email = document.getElementById("email").value.trim().toLowerCase();
  const password = document.getElementById("password").value.trim();
  const role = document.getElementById("role").value;

  if (!email || !password) {
    alert("Enter email and password");
    return;
  }

  try {
    console.log("Calling function as:", user.email);

    await createUserFn({
      email,
      password,
      role
    });

    alert("✅ User created (Auth + DB)");

    document.getElementById("email").value = "";
    document.getElementById("password").value = "";

    loadUsers();

  } catch (e) {
    console.error("Function error:", e);
    alert("❌ " + (e.message || "Error creating user"));
  }
};

/* 📋 LOAD USERS */
async function loadUsers() {
  const snap = await get(ref(db, "config/taskviewUsers"));
  const data = snap.val() || {};

  const container = document.getElementById("userList");
  container.innerHTML = "";

  ["admin", "viewer"].forEach(role => {
    const users = data[role] || {};

    Object.entries(users).forEach(([key, u]) => {

      const div = document.createElement("div");
      div.style.padding = "6px";
      div.style.borderBottom = "1px solid #eee";

      div.innerHTML = `
        <b>${u.email}</b> (${role})
        <button onclick="toggle('${role}','${key}',${u.active})">
          ${u.active ? "Deactivate" : "Activate"}
        </button>
      `;

      container.appendChild(div);
    });
  });
}

/* 🔄 TOGGLE ACTIVE */
window.toggle = async function(role, key, current) {
  await update(ref(db, `config/taskviewUsers/${role}/${key}`), {
    active: !current
  });

  loadUsers();
};

</script>

</body>
</html>
