<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Export Tasks</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 16px;
      margin: 0;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .card {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
      margin-bottom: 20px;
    }

    .status {
      font-size: 14px;
      margin-bottom: 10px;
      color: #555;
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      background: #2ecc71;
      color: white;
    }

    button:disabled {
      background: #95a5a6;
    }

    .small {
      font-size: 12px;
      color: #888;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>

<body>

  <h2>📤 Export Completed Tasks</h2>

  <div class="card">
    <div id="taskCount" class="status">
      Checking local data...
    </div>

    <button id="exportBtn" onclick="exportData()">
      📦 Export LOCAL_COMPLETED Tasks
    </button>

    <div class="small">
      This will export tasks saved locally (not yet synced).
    </div>
  </div>

<script>
const DB_NAME = "driver_uploads";
const DB_VERSION = 4;
const TASK_STORE = "tasks";
const PHOTO_STORE = "photos";

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function getAll(storeName, db) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, "readonly");
    const store = tx.objectStore(storeName);
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

async function checkTaskCount() {
  const db = await openDB();
  const tasks = await getAll(TASK_STORE, db);

  const localCompleted = tasks.filter(
    t => t.status === "LOCAL_COMPLETED"
  );

  const el = document.getElementById("taskCount");
  const btn = document.getElementById("exportBtn");

  el.innerText = `LOCAL_COMPLETED tasks: ${localCompleted.length}`;

  btn.disabled = localCompleted.length === 0;
}

async function exportData() {
  const btn = document.getElementById("exportBtn");
  btn.disabled = true;
  btn.innerText = "⏳ Preparing export...";

  try {
    const db = await openDB();
    const tasks = await getAll(TASK_STORE, db);
    const photos = await getAll(PHOTO_STORE, db);

    const completed = tasks.filter(
      t => t.status === "LOCAL_COMPLETED"
    );

    const exportPayload = [];

    for (const task of completed) {
      const relatedPhotos = photos.filter(
        p => p.taskKey === task._key
      );

      const photoExports = [];

      for (const p of relatedPhotos) {
        const base64 = await blobToBase64(p.blob);

        photoExports.push({
          photoIndex: p.photoIndex,
          takenAt: p.takenAt,
          gps: p.gps,
          deliveryData: p.deliveryData || {},
          imageBase64: base64
        });
      }

      exportPayload.push({
        task,
        photos: photoExports
      });
    }

    const blob = new Blob(
      [JSON.stringify(exportPayload)],
      { type: "application/json" }
    );

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `LOCAL_COMPLETED_export_${Date.now()}.json`;
    a.click();

    URL.revokeObjectURL(url);

    alert(`✅ Exported ${exportPayload.length} task(s)`);

  } catch (err) {
    alert("Export failed: " + err.message);
  }

  btn.innerText = "📦 Export LOCAL_COMPLETED Tasks";
  checkTaskCount();
}

// Run on load
checkTaskCount();
</script>

</body>
</html>
