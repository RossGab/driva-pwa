<!DOCTYPE html>
<html>
<head>
  <title>NSCA Task Viewer Login</title>

  <style>
    * {
      box-sizing: border-box;
    }
    
    body{
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
      font-family:Arial;
      background:#f3f3f3;
    }

    .box {
      background:#fff;
      padding:20px;
      border-radius:10px;
      width:320px;
      box-shadow:0 0 10px rgba(0,0,0,.1);
    }

    /* 🔥 MATCH ADMIN STYLE */
    .admin-header {
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:15px;
    }

    .admin-logo {
      height:60px;
    }

    .admin-header h3 {
      margin:0;
    }

    input {
      width:100%;
      padding:10px;
      margin-bottom:10px;
      border:1px solid #ccc;
      border-radius:5px;
    }

    button {
      width:100%;
      padding:10px;
      background:#007bff;
      color:#fff;
      border:none;
      cursor:pointer;
      border-radius:5px;
    }

    button:disabled {
      background:#999;
    }

    .error {
      color:red;
      font-size:13px;
      margin-top:5px;
    }
  </style>
</head>

<body>

<div class="box">

  <!-- 🔥 LOGO + TITLE -->
  <div class="admin-header">
    <img src="https://cdn.jsdelivr.net/gh/RossGab/driva-pwa/logo.jpg" class="admin-logo">
    <h3>NSCA Task Viewer v1</h3>
  </div>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div id="error" class="error"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDFW61pnwLvh6HGKWt10zLYNr860fI8vkg",
  authDomain: "driva-pwa.firebaseapp.com",
  databaseURL: "https://driva-pwa-default-rtdb.firebaseio.com",
  projectId: "driva-pwa",
  storageBucket: "driva-pwa.firebasestorage.app",
  messagingSenderId: "299138219722",
  appId: "1:299138219722:web:623ff6b0a067ea822dfe33"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* ✅ AUTO REDIRECT IF LOGGED IN */
onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.href = "taskview.html";
  }
});

/* 🔐 LOGIN */
window.login = async function () {
  const email = document.getElementById("email").value.trim();
  const pass = document.getElementById("password").value.trim();
  const errorBox = document.getElementById("error");
  const btn = document.querySelector("button");

  errorBox.innerText = "";

  // ✅ VALIDATION
  if (!email || !pass) {
    errorBox.innerText = "Please enter email and password";
    return;
  }

  btn.innerText = "Logging in...";
  btn.disabled = true;

  try {
    await signInWithEmailAndPassword(auth, email, pass);
    window.location.href = "taskview.html";
  } catch (e) {
    console.error(e); // 🔥 hidden from UI

    errorBox.innerText = "Wrong email or password";

    btn.innerText = "Login";
    btn.disabled = false;
  }
};
</script>

</body>
</html>
