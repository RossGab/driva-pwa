<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Viewer v2.0</title>

<style>
body {
  font-family: Arial;
  background:#f3f3f3;
  padding:10px;
}

h1 { margin:0; }

.dashboard {
  display:flex;
  gap:10px;
  margin-bottom:12px;
}

.card {
  flex:1;
  background:#fff;
  padding:16px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 0 4px rgba(0,0,0,.1);
}

.big {
  font-size:32px;
  font-weight:bold;
}

.actions {
  display:flex;
  gap:8px;
  margin-bottom:12px;
}

button {
  flex:1;
  padding:12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.doneBtn { background:green; color:#fff; }

.task {
  background:#fff;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  box-shadow:0 0 4px rgba(0,0,0,.1);
  border-left:5px solid green;
}

.small {
  font-size:13px;
  color:#555;
}

#searchBox {
  width:100%;
  padding:10px;
  margin-bottom:12px;
  border-radius:6px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<h1>Task Viewer</h1>

<!-- DATE -->
<div style="margin-bottom:10px;">
  <input type="date" id="dateFrom">
  to
  <input type="date" id="dateTo">
</div>

<!-- DASHBOARD -->
<div class="dashboard">
  <div class="card">
    <div class="big" id="doneCount">0</div>
    Completed Tasks
  </div>
</div>

<!-- ACTION -->
<div class="actions">
  <button class="doneBtn" onclick="loadTasks()">✅ Refresh</button>
</div>

<!-- SEARCH -->
<input id="searchBox" placeholder="Search...">

<!-- BA FILTER -->
<div id="baFilters"></div>

<!-- LIST -->
<div id="taskList"></div>

<!-- PAGINATION -->
<div id="pagination"></div>

<script>
const SNAPSHOT_BASE =
"https://raw.githubusercontent.com/RossGab/driva-task-snapshots/main/snapshots";

function getTodayPH() {
  return new Date().toLocaleDateString("en-CA", {
    timeZone:"Asia/Manila"
  });
}

let DATE_FROM = getTodayPH();
let DATE_TO = getTodayPH();

document.getElementById("dateFrom").value = DATE_FROM;
document.getElementById("dateTo").value = DATE_TO;

let TASKS = [];
let FILTERED = [];
let PAGE = 0;
const PAGE_SIZE = 200;
let SEARCH = "";
let FILTER_BA = new Set();
let ALL_BA = new Set();

/* LOAD SNAPSHOT */
async function loadTasks() {

  DATE_FROM = dateFrom.value;
  DATE_TO = dateTo.value;

  const keys = getDateKeys(DATE_FROM, DATE_TO);

  let all = [];

  for (const k of keys) {
    try {
      const res = await fetch(`${SNAPSHOT_BASE}/${k}.json`);
      if (!res.ok) continue;

      const data = await res.json();

      const arr = Object.entries(data).map(([id,t]) => ({
        _key:id, ...t
      }));

      all = all.concat(arr);

    } catch {}
  }

  if (!all.length) {
    taskList.innerHTML = "No data";
    return;
  }

  // ✅ ONLY COMPLETED
  TASKS = all.filter(t => t.status === "COMPLETED");

  // collect BA
  ALL_BA.clear();
  TASKS.forEach(t => t.BA && ALL_BA.add(t.BA));

  renderBA();
  applyFilters();
  renderDashboard();
}

/* FILTER */
function applyFilters() {
  let t = [...TASKS];

  if (SEARCH) {
    t = t.filter(x =>
      Object.values(x).some(v =>
        String(v).toLowerCase().includes(SEARCH)
      )
    );
  }

  if (FILTER_BA.size) {
    t = t.filter(x => FILTER_BA.has(x.BA));
  }

  // ✅ SORT LATEST FIRST
  t.sort((a,b)=>
    new Date(b.completedAt || b.createdAt || 0)
    - new Date(a.completedAt || a.createdAt || 0)
  );

  FILTERED = t;
  PAGE = 0;

  renderList();
  renderPagination();
}

/* DASHBOARD */
function renderDashboard() {
  doneCount.innerText = TASKS.length;
}

/* LIST */
function renderList() {

  const start = PAGE * PAGE_SIZE;
  const items = FILTERED.slice(start, start+PAGE_SIZE);

  if (!items.length) {
    taskList.innerHTML = "No results";
    return;
  }

  taskList.innerHTML = items.map(t => `
    <div class="task">
      <b>${t.CUSTOMERNAME || ""}</b>
      <div class="small">${t.ADDRESS || ""}</div>
      <div class="small">Driver: ${t.driverId || "—"}</div>
    </div>
  `).join("");
}

/* PAGINATION */
function renderPagination() {
  const total = Math.ceil(FILTERED.length / PAGE_SIZE);

  pagination.innerHTML = `
    <button ${PAGE===0?"disabled":""} onclick="prev()">Prev</button>
    Page ${PAGE+1} / ${total}
    <button ${PAGE>=total-1?"disabled":""} onclick="next()">Next</button>
  `;
}

function prev(){ PAGE--; renderList(); renderPagination(); }
function next(){ PAGE++; renderList(); renderPagination(); }

/* BA FILTER */
function renderBA() {
  baFilters.innerHTML = [...ALL_BA].map(ba => `
    <label>
      <input type="checkbox" value="${ba}"
      onchange="toggleBA('${ba}', this.checked)">
      ${ba}
    </label>
  `).join(" ");
}

function toggleBA(ba, checked) {
  checked ? FILTER_BA.add(ba) : FILTER_BA.delete(ba);
  applyFilters();
}

/* SEARCH */
searchBox.oninput = e => {
  SEARCH = e.target.value.toLowerCase();
  applyFilters();
};

/* DATE KEYS */
function getDateKeys(from,to){
  const arr=[];
  let d=new Date(from);
  const end=new Date(to);

  while(d<=end){
    arr.push(d.toISOString().slice(0,10).replace(/-/g,""));
    d.setDate(d.getDate()+1);
  }
  return arr;
}

/* INIT */
loadTasks();
</script>

</body>
</html>
