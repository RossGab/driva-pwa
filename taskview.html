<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Viewer</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#f3f3f3;
  padding:10px;
}

.admin-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}

.admin-logo {
  height:72px;
}

.version {
  font-size:14px;
  color:#777;
}

.dashboard {
  display:flex;
  gap:10px;
  margin-bottom:12px;
}

.card {
  flex:1;
  background:#fff;
  padding:16px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 0 4px rgba(0,0,0,.1);
}

.done { border-top:5px solid green; }

.big {
  font-size:32px;
  font-weight:bold;
}

#searchBox {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

.task {
  background:#fff;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  box-shadow:0 0 4px rgba(0,0,0,.1);
  border-left:5px solid green;
}

.task-header {
  cursor:pointer;
}

.small {
  font-size:13px;
  color:#555;
}

.task-form {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.task-form label {
  font-size:12px;
  font-weight:bold;
}

.task-form input,
.task-form textarea {
  padding:6px;
  border-radius:4px;
  border:1px solid #ccc;
}

.full { grid-column: span 2; }

.photo-grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  margin-top:10px;
}

.photo-grid img {
  width:100%;
  height:90px;
  object-fit:cover;
  border-radius:6px;
  border:2px solid #28a745;
}
</style>
</head>

<body>

<div class="admin-header">
  <div style="display:flex;align-items:center;gap:12px;">
    <img src="./logo.jpg" class="admin-logo">
    <h2>Task Viewer <span class="version">View Only</span></h2>
  </div>

  <div>
    <input type="date" id="from">
    <span>to</span>
    <input type="date" id="to">
  </div>
</div>

<div class="dashboard">
  <div class="card done">
    <div class="big" id="doneCount">0</div>
    Completed Tasks
  </div>
</div>

<input id="searchBox" placeholder="Search...">

<div id="taskList">Loading...</div>

<script>
const SNAPSHOT_BASE =
"https://raw.githubusercontent.com/RossGab/driva-task-snapshots/main/snapshots";

let TASKS = [];
let FILTERED = [];

const fromInput = document.getElementById("from");
const toInput = document.getElementById("to");
const searchBox = document.getElementById("searchBox");

function todayPH(){
  return new Date().toLocaleDateString("en-CA",{timeZone:"Asia/Manila"});
}

fromInput.value = todayPH();
toInput.value = todayPH();

function getKeys(from,to){
  let arr=[];
  let d1=new Date(from), d2=new Date(to);

  for(let d=new Date(d1); d<=d2; d.setDate(d.getDate()+1)){
    arr.push(d.toLocaleDateString("en-CA",{timeZone:"Asia/Manila"}).replace(/-/g,""));
  }
  return arr;
}

async function loadTasks(){
  let keys=getKeys(fromInput.value,toInput.value);

  let all=[];

  for(let k of keys){
    try{
      let res=await fetch(`${SNAPSHOT_BASE}/${k}.json`);
      if(!res.ok) continue;

      let data=await res.json();

      let arr=Object.entries(data).map(([id,t])=>({
        _key:id,...t
      }));

      all=all.concat(arr);
    }catch{}
  }

  // ✅ ONLY COMPLETED
  TASKS=all.filter(t=>t.status==="COMPLETED");

  document.getElementById("doneCount").innerText=TASKS.length;

  FILTERED=TASKS;
  renderTasks();
}

function renderTasks(){
  let box=document.getElementById("taskList");
  box.innerHTML="";

  if(!FILTERED.length){
    box.innerHTML="<div>No completed tasks</div>";
    return;
  }

  FILTERED.forEach(t=>{
    let div=document.createElement("div");
    div.className="task";

    div.innerHTML=`
      <div class="task-header">
        <b>${t.CUSTOMERNAME||""}</b>
        <div class="small">${t.ADDRESS||""}</div>
        <div class="small">Driver: ${t.driverId||""}</div>
      </div>

      <div class="task-details" style="display:none">

        <div class="task-form">
          <label>JOB TYPE</label>
          <input value="${t.JOBTYPE||""}" disabled>

          <label>BA</label>
          <input value="${t.BA||""}" disabled>

          <label class="full">ADDRESS</label>
          <textarea class="full" disabled>${t.ADDRESS||""}</textarea>
        </div>

        ${renderPhotos(t)}

      </div>
    `;

    let header=div.querySelector(".task-header");
    let details=div.querySelector(".task-details");

    header.onclick=()=>{
      details.style.display=
        details.style.display==="none"?"block":"none";
    };

    box.appendChild(div);
  });
}

function renderPhotos(t){
  let photos=[t.photo1Url,t.photo2Url,t.photo3Url].filter(Boolean);

  if(!photos.length) return "";

  return `
    <div class="photo-grid">
      ${photos.map(p=>`<img src="${p}">`).join("")}
    </div>
  `;
}

searchBox.oninput=()=>{
  let s=searchBox.value.toLowerCase();

  FILTERED=TASKS.filter(t=>
    Object.values(t).some(v=>
      String(v||"").toLowerCase().includes(s)
    )
  );

  renderTasks();
};

fromInput.onchange=loadTasks;
toInput.onchange=loadTasks;

loadTasks();
</script>

</body>
</html>
