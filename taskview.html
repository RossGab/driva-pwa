<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks Viewer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background:#f3f3f3;
  padding:10px;
}

.dashboard {
  display:flex;
  gap:10px;
  margin-bottom:12px;
}

.card {
  flex:1;
  background:#fff;
  padding:16px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 0 4px rgba(0,0,0,.1);
}

.done { border-top:5px solid green; }

.big {
  font-size:32px;
  font-weight:bold;
}

.admin-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 12px;
  justify-content:space-between;
}

.admin-logo {
  height: 72px;
}

#searchBox {
  width:100%;
  padding:10px;
  margin-bottom:12px;
  border-radius:6px;
  border:1px solid #ccc;
}

.task {
  background:#fff;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  box-shadow:0 0 4px rgba(0,0,0,.1);
  border-left:5px solid green;
}

.task-header { cursor:pointer; }

.small {
  font-size:13px;
  color:#555;
}

.task-form {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.task-form .full { grid-column: span 2; }

.task-form input,
.task-form textarea {
  width:100%;
  padding:6px;
  border:1px solid #ccc;
  border-radius:4px;
}
</style>
</head>

<body>

<div class="admin-header">
  <div style="display:flex;align-items:center;gap:14px;">
    <img src="./logo.jpg" class="admin-logo">
    <h1>Tasks Viewer</h1>
  </div>
</div>

<div class="dashboard">
  <div class="card done">
    <div class="big" id="doneCount">0</div>
    Completed Tasks
  </div>
</div>

<input id="searchBox" placeholder="Search...">

<div id="taskList">Loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "driva-pwa.firebaseapp.com",
  databaseURL: "https://driva-pwa-default-rtdb.firebaseio.com",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let TASKS = [];

async function loadTasks() {
  const snap = await get(ref(db, "tasks"));
  const data = snap.val() || {};

  TASKS = Object.entries(data)
    .map(([id, t]) => ({ _key:id, ...t }))
    .filter(t => t.status === "COMPLETED");

  document.getElementById("doneCount").innerText = TASKS.length;

  renderTasks(TASKS);
}

function renderTasks(tasks) {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  tasks.forEach(t => {
    const div = document.createElement("div");
    div.className = "task";

    div.innerHTML = `
      <div class="task-header">
        <b>${t.CUSTOMERNAME || ""}</b>
        <div class="small">${t.ADDRESS || ""}</div>
        <div class="small">Driver: ${t.driverId || "-"}</div>
      </div>

      <div class="task-details" style="display:none">

        <div class="task-form">
          <label>Account</label>
          <input value="${t.ACCOUNTNUMBER || ""}" disabled>

          <label>Meter</label>
          <input value="${t.METERNUMBER || ""}" disabled>

          <label class="full">Remarks</label>
          <textarea class="full" disabled>${t.remarks || ""}</textarea>
        </div>

        ${renderPhotos(t)}

        <div style="margin-top:10px;color:#777;font-size:12px;">
          🔒 View Only
        </div>

      </div>
    `;

    const header = div.querySelector(".task-header");
    const details = div.querySelector(".task-details");

    header.onclick = () => {
      details.style.display =
        details.style.display === "none" ? "block" : "none";
    };

    list.appendChild(div);
  });
}

function renderPhotos(t) {
  const photos = [t.photo1Url, t.photo2Url, t.photo3Url].filter(Boolean);
  if (!photos.length) return "";

  return `
    <div style="margin-top:10px">
      ${photos.map(url => `
        <img src="${url}" style="width:100px;margin:4px;cursor:pointer"
        onclick="window.open('${url}')">
      `).join("")}
    </div>
  `;
}

document.getElementById("searchBox").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();

  const filtered = TASKS.filter(t =>
    Object.values(t).some(v =>
      String(v || "").toLowerCase().includes(val)
    )
  );

  renderTasks(filtered);
});

loadTasks();
</script>

</body>
</html>
