<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Viewer</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#f3f3f3;
  padding:10px;
}

.admin-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}

.admin-logo {
  height:72px;
}

.dashboard {
  display:flex;
  gap:10px;
  margin-bottom:12px;
}

.card {
  flex:1;
  background:#fff;
  padding:16px;
  border-radius:10px;
  text-align:center;
}

.done { border-top:5px solid green; }

.big {
  font-size:32px;
  font-weight:bold;
}

.task {
  background:#fff;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  border-left:5px solid green;
}

.task-header { cursor:pointer; }

.small {
  font-size:13px;
  color:#555;
}

.task-form {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.full { grid-column: span 2; }

input, textarea {
  width:100%;
  padding:6px;
  border-radius:4px;
  border:1px solid #ccc;
}

button {
  margin-top:10px;
  padding:8px;
  background:#007bff;
  color:#fff;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

/* LOADER */
#loadingScreen {
  position:fixed;
  inset:0;
  background:rgba(255,255,255,0.95);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.spinner {
  width:40px;
  height:40px;
  border:4px solid #ddd;
  border-top:4px solid #007bff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div id="loadingScreen">
  <div class="spinner"></div>
</div>

<div class="admin-header">
  <div style="display:flex;gap:10px;align-items:center;">
    <img src="./logo.jpg" class="admin-logo">
    <h2>Task Viewer</h2>
  </div>

  <div>
    <input type="date" id="from">
    <span>to</span>
    <input type="date" id="to">
  </div>
</div>

<div class="dashboard">
  <div class="card done">
    <div class="big" id="doneCount">0</div>
    Completed Tasks
  </div>
</div>

<input id="searchBox" placeholder="Search..." style="width:100%;padding:10px;margin-bottom:10px;">

<div id="taskList"></div>

<script>
const SNAPSHOT_BASE =
"https://raw.githubusercontent.com/RossGab/driva-task-snapshots/main/snapshots";

let TASKS = [];
let FILTERED = [];

const fromInput = document.getElementById("from");
const toInput = document.getElementById("to");

function todayPH(){
  return new Date().toLocaleDateString("en-CA",{timeZone:"Asia/Manila"});
}

fromInput.value = todayPH();
toInput.value = todayPH();

function showLoader(){ document.getElementById("loadingScreen").style.display="flex"; }
function hideLoader(){ document.getElementById("loadingScreen").style.display="none"; }

function getKeys(from,to){
  let arr=[];
  let d1=new Date(from), d2=new Date(to);

  for(let d=new Date(d1); d<=d2; d.setDate(d.getDate()+1)){
    arr.push(d.toLocaleDateString("en-CA",{timeZone:"Asia/Manila"}).replace(/-/g,""));
  }
  return arr;
}

async function loadTasks(){
  showLoader();

  let keys=getKeys(fromInput.value,toInput.value);
  let all=[];

  for(let k of keys){
    try{
      let res=await fetch(`${SNAPSHOT_BASE}/${k}.json`);
      if(!res.ok) continue;

      let data=await res.json();

      let arr=Object.entries(data).map(([id,t])=>({
        _key:id,...t
      }));

      all=all.concat(arr);
    }catch{}
  }

  TASKS = all.filter(t => t.status === "COMPLETED");

  document.getElementById("doneCount").innerText = TASKS.length;

  FILTERED = TASKS;
  renderTasks();

  hideLoader();
}

function renderTasks(){
  const box=document.getElementById("taskList");
  box.innerHTML="";

  FILTERED.forEach(t=>{
    const div=document.createElement("div");
    div.className="task";

    div.innerHTML=`
      <div class="task-header">
        <b>${t.CUSTOMERNAME||""}</b>
        <div class="small">${t.ADDRESS||""}</div>
        <div class="small">Driver: ${t.driverId||""}</div>
      </div>

      <div class="task-details" style="display:none">
        ${renderDetails(t)}

        <button onclick="loadTaskPhotos('${t._key}', this)">
          📸 Load Photos
        </button>
      </div>
    `;

    const header=div.querySelector(".task-header");
    const details=div.querySelector(".task-details");

    header.onclick=()=>{
      details.style.display =
        details.style.display==="none" ? "block" : "none";
    };

    box.appendChild(div);
  });
}

function renderDetails(t){
  return `
    <div class="task-form">
      <label>JOB TYPE</label>
      <input value="${t.JOBTYPE||""}" disabled>

      <label>BA</label>
      <input value="${t.BA||""}" disabled>

      <label class="full">ADDRESS</label>
      <textarea class="full" disabled>${t.ADDRESS||""}</textarea>
    </div>
  `;
}

async function loadTaskPhotos(taskId, btn){
  if(btn.dataset.loaded==="1") return;

  btn.innerText="Loading...";
  btn.dataset.loaded="1";

  let keys=getKeys(fromInput.value,toInput.value);

  for(let k of keys){
    try{
      let res=await fetch(`${SNAPSHOT_BASE}/${k}.json`);
      if(!res.ok) continue;

      let data=await res.json();
      if(!data[taskId]) continue;

      let t=data[taskId];

      let photos=[t.photo1Url,t.photo2Url,t.photo3Url].filter(Boolean);

      if(!photos.length){
        btn.innerText="No photos";
        return;
      }

      const container=document.createElement("div");

      container.innerHTML = photos.map(p=>
        `<img src="${p}" style="width:100px;margin:5px;">`
      ).join("");

      btn.after(container);
      btn.innerText="Photos Loaded";

      return;

    }catch{}
  }

  btn.innerText="No photos";
}

document.getElementById("searchBox").oninput=e=>{
  let s=e.target.value.toLowerCase();

  FILTERED=TASKS.filter(t=>
    Object.values(t).some(v=>
      String(v||"").toLowerCase().includes(s)
    )
  );

  renderTasks();
};

fromInput.onchange=loadTasks;
toInput.onchange=loadTasks;

loadTasks();
</script>

</body>
</html>
