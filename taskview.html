<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Monitoring Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body { font-family: Arial; background:#f3f3f3; padding:10px; }

.admin-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:12px;
}

.admin-logo { height:72px; }

.dashboard {
  display:flex; gap:10px; margin-bottom:12px;
}

.card {
  flex:1; background:#fff; padding:16px; border-radius:10px;
  text-align:center; box-shadow:0 0 4px rgba(0,0,0,.1);
}

.done { border-top:5px solid green; }

.big { font-size:32px; font-weight:bold; }

.task {
  background:#fff; padding:12px; margin-bottom:10px;
  border-radius:8px; box-shadow:0 0 4px rgba(0,0,0,.1);
  border-left:5px solid green;
}

.task-header { cursor:pointer; }

.small { font-size:13px; color:#555; }

.task-form {
  display:grid; grid-template-columns:1fr 1fr; gap:10px;
}

.task-form .full { grid-column: span 2; }

input, textarea {
  width:100%; padding:6px;
  border-radius:4px; border:1px solid #ccc;
}

#searchBox {
  width:100%; padding:10px; margin-bottom:12px;
  border-radius:6px; border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="admin-header">
  <div style="display:flex;align-items:center;gap:14px;">
    <img src="./logo.jpg" class="admin-logo">
    <h1>Task Monitoring Dashboard</h1>
  </div>

  <div>
    <input type="date" id="dateFrom">
    <input type="date" id="dateTo">
  </div>
</div>

<div class="dashboard">
  <div class="card done">
    <div class="big" id="doneCount">0</div>
    Completed Tasks
  </div>
</div>

<input id="searchBox" placeholder="Search name, address, driver...">

<div id="taskList">Loading...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDFW...",
  authDomain: "driva-pwa.firebaseapp.com",
  databaseURL: "https://driva-pwa-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let TASKS = [];
let FILTERED = [];

function todayPH() {
  return new Date().toLocaleDateString("en-CA",{timeZone:"Asia/Manila"});
}

const fromInput = document.getElementById("dateFrom");
const toInput = document.getElementById("dateTo");

fromInput.value = todayPH();
toInput.value = todayPH();

fromInput.onchange = loadTasks;
toInput.onchange = loadTasks;

async function loadTasks() {
  const snap = await get(ref(db,"tasks"));
  const data = snap.val() || {};

  const from = fromInput.value;
  const to = toInput.value;

  TASKS = Object.entries(data)
    .map(([id,t]) => ({_key:id,...t}))
    .filter(t => t.status === "COMPLETED")
    .filter(t => {
      if (!t.createdAt) return true;
      const d = new Date(t.createdAt).toISOString().slice(0,10);
      return d >= from && d <= to;
    });

  document.getElementById("doneCount").innerText = TASKS.length;

  FILTERED = TASKS;
  renderTasks(FILTERED);
}

function renderTasks(tasks){
  const list = document.getElementById("taskList");
  list.innerHTML="";

  tasks.forEach(t=>{
    const div = document.createElement("div");
    div.className="task";

    div.innerHTML = `
      <div class="task-header">
        <b>${t.CUSTOMERNAME||""}</b>
        <div class="small">${t.ADDRESS||""}</div>
        <div class="small">Driver: ${t.driverId||"-"}</div>
      </div>

      <div class="task-details" style="display:none">

        <div class="task-form">
          <label>Account</label>
          <input value="${t.ACCOUNTNUMBER||""}" disabled>

          <label>Meter</label>
          <input value="${t.METERNUMBER||""}" disabled>

          <label class="full">Remarks</label>
          <textarea class="full" disabled>${t.remarks||""}</textarea>
        </div>

        ${photos(t)}

        <div style="
          margin-top:10px;
          padding:8px;
          background:#f7f7f7;
          border-left:4px solid #28a745;
          font-size:12px;
        ">
          ✔ Completed Task (Read Only)
        </div>

      </div>
    `;

    const header = div.querySelector(".task-header");
    const details = div.querySelector(".task-details");

    header.onclick = ()=>{
      details.style.display =
        details.style.display==="none"?"block":"none";
    };

    list.appendChild(div);
  });
}

function photos(t){
  const arr=[t.photo1Url,t.photo2Url,t.photo3Url].filter(Boolean);
  if(!arr.length) return "";

  return `
    <div style="margin-top:10px">
      ${arr.map(u=>`
        <img src="${u}" style="width:100px;margin:4px;cursor:pointer"
        onclick="window.open('${u}')">
      `).join("")}
    </div>
  `;
}

document.getElementById("searchBox").addEventListener("input",e=>{
  const val=e.target.value.toLowerCase();

  FILTERED = TASKS.filter(t =>
    Object.values(t).some(v =>
      String(v||"").toLowerCase().includes(val)
    )
  );

  renderTasks(FILTERED);
});

loadTasks();
</script>

</body>
</html>
