<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Completed Tasks Viewer</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#f3f3f3;
  padding:10px;
}

.admin-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}

.admin-logo {
  height:72px;
}

#loadingScreen {
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.95);
  z-index: 9999;
  display:flex;
  align-items:center;
  justify-content:center;
}

.spinner {
  width:42px;
  height:42px;
  border:4px solid #ddd;
  border-top:4px solid #007bff;
  border-radius:50%;
  animation: spin 1s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.task {
  background:#fff;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  border-left:5px solid green;
}

.task-header { cursor:pointer; }

.small {
  font-size:13px;
  color:#555;
}

.task-form {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.task-form .full {
  grid-column: span 2;
}

.task-form input,
.task-form textarea {
  width:100%;
  padding:6px;
  border:1px solid #ccc;
  border-radius:4px;
}
</style>
</head>

<body>

<div class="admin-header">
  <img src="./logo.jpg" class="admin-logo">
  <h2>Completed Tasks Viewer</h2>

  <div>
    <input type="date" id="from">
    to
    <input type="date" id="to">
  </div>
</div>

<!-- SEARCH -->
<input id="searchBox" placeholder="Search..." style="width:100%;padding:10px;margin-bottom:10px">

<!-- BA FILTER -->
<div id="baFilters"></div>

<div id="loadingScreen">
  <div class="spinner"></div>
</div>

<div id="taskList"></div>

<script type="module">
import { initializeApp } from
"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getDatabase, ref, get
} from
"https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* FIREBASE (UNCHANGED) */
const firebaseConfig = {
  apiKey: "AIzaSyDFW61pnwLvh6HGKWt10zLYNr860fI8vkg",
  authDomain: "driva-pwa.firebaseapp.com",
  databaseURL: "https://driva-pwa-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* SNAPSHOT */
const BASE =
"https://raw.githubusercontent.com/RossGab/driva-task-snapshots/main/snapshots";

let TASKS = [];
let DRIVER_UI_CONFIG = {};
let FILTER_BA = new Set();
let SEARCH_TERM = "";

/* DATE */
function getTodayPH() {
  return new Date().toLocaleDateString("en-CA", {
    timeZone:"Asia/Manila"
  });
}

const from = document.getElementById("from");
const to = document.getElementById("to");

from.value = getTodayPH();
to.value = getTodayPH();

/* DATE KEYS */
function getKeys(from,to){
  const keys=[];
  let d=new Date(from);
  const end=new Date(to);

  while(d<=end){
    keys.push(
      d.toLocaleDateString("en-CA",{timeZone:"Asia/Manila"})
       .replace(/-/g,"")
    );
    d.setDate(d.getDate()+1);
  }
  return keys;
}

/* LOAD CONFIG */
async function loadConfig(){
  const snap = await get(ref(db,"config/driverUI/jobTypes"));
  DRIVER_UI_CONFIG = snap.val() || {};
}

/* LOAD TASKS (SAME BEHAVIOR — NO FREEZE) */
async function loadTasks(){
  showLoader();

  const keys = getKeys(from.value,to.value);

  let all=[];

  const res = await Promise.allSettled(
    keys.map(k =>
      fetch(`${BASE}/${k}.json`,{cache:"no-store"})
        .then(r=>r.ok?r.json():null)
    )
  );

  res.forEach(r=>{
    if(r.status==="fulfilled" && r.value){
      Object.entries(r.value).forEach(([id,t])=>{
        if(t.status==="COMPLETED"){
          all.push({_key:id,...t});
        }
      });
    }
  });

  TASKS = all;

  buildBAFilters();
  render();

  hideLoader();
}

/* SEARCH */
document.getElementById("searchBox").oninput = e=>{
  SEARCH_TERM = e.target.value.toLowerCase();
  render();
};

/* BA FILTER */
function buildBAFilters(){
  const container = document.getElementById("baFilters");
  container.innerHTML="";

  const bas = new Set(TASKS.map(t=>t.BA).filter(Boolean));

  bas.forEach(ba=>{
    const label=document.createElement("label");
    label.innerHTML=`
      <input type="checkbox" value="${ba}">
      ${ba}
    `;

    label.querySelector("input").onchange = e=>{
      if(e.target.checked) FILTER_BA.add(ba);
      else FILTER_BA.delete(ba);

      render();
    };

    container.appendChild(label);
  });
}

/* RENDER */
function render(){
  const list=document.getElementById("taskList");
  list.innerHTML="";

  let tasks = TASKS;

  if(SEARCH_TERM){
    tasks = tasks.filter(t =>
      Object.values(t).some(v =>
        String(v||"").toLowerCase().includes(SEARCH_TERM)
      )
    );
  }

  if(FILTER_BA.size){
    tasks = tasks.filter(t => FILTER_BA.has(t.BA));
  }

  tasks.forEach(t=>{
    const div=document.createElement("div");
    div.className="task";

    div.innerHTML=`
      <div class="task-header">
        <b>${t.CUSTOMERNAME||""}</b>
        <div class="small">${t.ADDRESS||""}</div>
        <div class="small">Driver: ${t.driverId||"—"}</div>
      </div>

      <div class="details" style="display:none">
        ${renderDetails(t)}
        ${renderDynamic(t)}

        <button onclick="loadPhotos('${t._key}',this)">
          📸 Load Photos
        </button>
      </div>
    `;

    div.querySelector(".task-header").onclick=()=>{
      const d = div.querySelector(".details");
      d.style.display = d.style.display==="none"?"block":"none";
    };

    list.appendChild(div);
  });
}

/* DETAILS (IDENTICAL) */
function renderDetails(t){
return `
<div class="task-form">

<label>ASSIGNED DRIVER</label>
<input value="${t.driverId||""}" disabled>

<label>JOB TYPE</label>
<input value="${t.JOBTYPE||""}" disabled>

<label>BA</label>
<input value="${t.BA||""}" disabled>

<label>DMZ</label>
<input value="${t.DMZ||""}" disabled>

<label>MRU</label>
<input value="${t.MRU||""}" disabled>

<label>SEQUENCE</label>
<input value="${t.SEQUENCE||""}" disabled>

<label>METER NUMBER</label>
<input value="${t.METERNUMBER||""}" disabled>

<label>ACCOUNT NUMBER</label>
<input value="${t.ACCOUNTNUMBER||""}" disabled>

<label>CUSTOMER NAME</label>
<input value="${t.CUSTOMERNAME||""}" disabled>

<label class="full">ADDRESS</label>
<textarea class="full" disabled>${t.ADDRESS||""}</textarea>

<label>ZIP CODE</label>
<input value="${t.ZIPCODE||""}" disabled>

<label>DELIVERY TYPE</label>
<input value="${t.deliveryType||""}" disabled>

<label>LATITUDE</label>
<input value="${t.LATITUDE||""}" disabled>

<label>LONGITUDE</label>
<input value="${t.LONGITUDE||""}" disabled>

</div>
`;
}

/* DYNAMIC (UNCHANGED) */
function renderDynamic(t){
  const cfg =
    DRIVER_UI_CONFIG?.[t.JOBTYPE]
    ?.deliveryMethods?.[t.deliveryType];

  if(!cfg) return "";

  let html=`<div class="task-form full"><b>DELIVERY DETAILS</b>`;

  cfg._order.forEach(k=>{
    const f=cfg.fields[k];
    if(!f) return;

    html+=`
      <label class="full">${f.label}</label>
      <input class="full" value="${t[k]||""}" disabled>
    `;
  });

  html+=`</div>`;
  return html;
}

/* PHOTOS (LAZY — SAME BEHAVIOR) */
window.loadPhotos = async function(id,btn){
  if(btn.dataset.loaded) return;

  btn.dataset.loaded=1;
  btn.innerText="Loading photos...";

  const snap = await get(ref(db,`tasks/${id}`));

  if(!snap.exists()){
    btn.innerText="No photos";
    return;
  }

  const t=snap.val();

  const box=document.createElement("div");
  box.style.display="grid";
  box.style.gridTemplateColumns="repeat(3,1fr)";
  box.style.gap="6px";
  box.style.marginTop="10px";

  [1,2,3].forEach(i=>{
    const url=t[`photo${i}Url`];
    if(!url) return;

    const img=document.createElement("img");
    img.src=url;
    img.style.width="100%";
    img.style.height="90px";
    img.style.objectFit="cover";
    img.onclick=()=>window.open(url);

    box.appendChild(img);
  });

  btn.after(box);
  btn.innerText="Photos Loaded";
};

/* LOADER */
function showLoader(){
  document.getElementById("loadingScreen").style.display="flex";
}
function hideLoader(){
  document.getElementById("loadingScreen").style.display="none";
}

/* INIT */
(async()=>{
  await loadConfig();
  await loadTasks();
})();

from.onchange=loadTasks;
to.onchange=loadTasks;

</script>

</body>
</html>
