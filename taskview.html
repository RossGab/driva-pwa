<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Task Viewer</title>

<style>
body {
  font-family: Arial;
  background:#f3f3f3;
  padding:10px;
}

/* HEADER */
.admin-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}

.admin-logo {
  height:72px;
}

/* LOADER */
#loadingScreen {
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.spinner {
  width:40px;
  height:40px;
  border:4px solid #ccc;
  border-top:4px solid #007bff;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg);} }

/* TASK */
.task {
  background:#fff;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  border-left:5px solid green;
}

.task-header {
  cursor:pointer;
}

.small { font-size:13px; color:#555; }

.task-form {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.task-form .full { grid-column:span 2; }

.task-form input,
.task-form textarea {
  width:100%;
  padding:6px;
  border:1px solid #ccc;
  border-radius:4px;
}

/* BUTTON */
.toggleBtn {
  margin-top:10px;
  padding:8px;
  background:#007bff;
  color:#fff;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="admin-header">
  <img src="./logo.jpg" class="admin-logo">
  <h2>Task Viewer</h2>

  <div>
    <input type="date" id="from">
    to
    <input type="date" id="to">
  </div>
</div>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="spinner"></div>
</div>

<!-- TASK LIST -->
<div id="taskList"></div>

<script type="module">
import { initializeApp } from
"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
  getDatabase, ref, get
} from
"https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "driva-pwa.firebaseapp.com",
  databaseURL: "https://driva-pwa-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* GLOBAL */
let DRIVER_UI_CONFIG = {};
let TASKS = [];

/* DATE */
function getTodayPH() {
  return new Date().toLocaleDateString("en-CA", {
    timeZone: "Asia/Manila"
  });
}

const from = document.getElementById("from");
const to = document.getElementById("to");

from.value = getTodayPH();
to.value = getTodayPH();

/* SNAPSHOT */
const BASE =
"https://raw.githubusercontent.com/RossGab/driva-task-snapshots/main/snapshots";

function getKeys(f,t){
  const arr=[];
  let d=new Date(f);
  const end=new Date(t);
  while(d<=end){
    arr.push(d.toISOString().slice(0,10).replace(/-/g,""));
    d.setDate(d.getDate()+1);
  }
  return arr;
}

async function loadTasks(){
  showLoader();

  const keys = getKeys(from.value,to.value);
  let all=[];

  for(const k of keys){
    const res = await fetch(`${BASE}/${k}.json`);
    if(!res.ok) continue;
    const data = await res.json();

    Object.entries(data).forEach(([id,t])=>{
      all.push({_key:id,...t});
    });
  }

  TASKS = all;
  render();

  hideLoader();
}

/* DRIVER CONFIG */
async function loadConfig(){
  const snap = await get(ref(db,"config/driverUI/jobTypes"));
  DRIVER_UI_CONFIG = snap.val() || {};
}

/* RENDER */
function render(){
  const list = document.getElementById("taskList");
  list.innerHTML="";

  TASKS.forEach(t=>{
    const div = document.createElement("div");
    div.className="task";

    div.innerHTML=`
      <div class="task-header">
        <b>${t.CUSTOMERNAME || ""}</b>
        <div class="small">${t.ADDRESS || ""}</div>
        <div class="small">Driver: ${t.driverId || "-"}</div>
      </div>

      <div class="details" style="display:none">
        ${renderDetails(t)}
        ${renderDynamic(t)}

        <button class="toggleBtn"
          onclick="loadPhotos('${t._key}',this)">
          📸 Load Photos
        </button>
      </div>
    `;

    div.querySelector(".task-header").onclick=()=>{
      const d=div.querySelector(".details");
      d.style.display = d.style.display==="none"?"block":"none";
    };

    list.appendChild(div);
  });
}

/* FULL DETAILS (MATCH ADMIN) */
function renderDetails(t){
return `
<div class="task-form">

<label>ASSIGNED DRIVER</label>
<input value="${t.driverId||""}" disabled>

<label>JOB TYPE</label>
<input value="${t.JOBTYPE||""}" disabled>

<label>BA</label>
<input value="${t.BA||""}" disabled>

<label>DMZ</label>
<input value="${t.DMZ||""}" disabled>

<label>MRU</label>
<input value="${t.MRU||""}" disabled>

<label>SEQUENCE</label>
<input value="${t.SEQUENCE||""}" disabled>

<label>METER NUMBER</label>
<input value="${t.METERNUMBER||""}" disabled>

<label>ACCOUNT NUMBER</label>
<input value="${t.ACCOUNTNUMBER||""}" disabled>

<label>CUSTOMER NAME</label>
<input value="${t.CUSTOMERNAME||""}" disabled>

<label class="full">ADDRESS</label>
<textarea class="full" disabled>${t.ADDRESS||""}</textarea>

<label>ZIP CODE</label>
<input value="${t.ZIPCODE||""}" disabled>

<label>DELIVERY TYPE</label>
<input value="${t.deliveryType||""}" disabled>

<label>LATITUDE</label>
<input value="${t.LATITUDE||""}" disabled>

<label>LONGITUDE</label>
<input value="${t.LONGITUDE||""}" disabled>

</div>
`;
}

/* DYNAMIC DELIVERY */
function renderDynamic(t){
  const cfg =
    DRIVER_UI_CONFIG?.[t.JOBTYPE]
    ?.deliveryMethods?.[t.deliveryType];

  if(!cfg) return "";

  let html = `<div class="task-form full"><b>DELIVERY DETAILS</b>`;

  cfg._order.forEach(k=>{
    const f = cfg.fields[k];
    if(!f) return;

    html+=`
      <label class="full">${f.label}</label>
      <input class="full" value="${t[k]||""}" disabled>
    `;
  });

  html += `</div>`;
  return html;
}

/* LOAD PHOTOS (SAME BEHAVIOR) */
window.loadPhotos = async function(id,btn){
  if(btn.dataset.loaded) return;
  btn.dataset.loaded=1;
  btn.innerText="Loading...";

  const snap = await get(ref(db,`tasks/${id}`));
  if(!snap.exists()){
    btn.innerText="No photos";
    return;
  }

  const t = snap.val();

  const box=document.createElement("div");
  box.style.display="grid";
  box.style.gridTemplateColumns="repeat(3,1fr)";
  box.style.gap="6px";

  [1,2,3].forEach(i=>{
    const url=t[`photo${i}Url`];
    if(!url) return;

    const img=document.createElement("img");
    img.src=url;
    img.style.width="100%";
    img.onclick=()=>window.open(url);

    box.appendChild(img);
  });

  btn.after(box);
  btn.innerText="Photos Loaded";
}

/* LOADER */
function showLoader(){
  document.getElementById("loadingScreen").style.display="flex";
}
function hideLoader(){
  document.getElementById("loadingScreen").style.display="none";
}

/* INIT */
(async()=>{
  await loadConfig();
  await loadTasks();
})();

/* DATE CHANGE */
from.onchange=loadTasks;
to.onchange=loadTasks;

</script>

</body>
</html>
