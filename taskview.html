<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Viewer</title>

<style>
body { font-family: Arial; background:#f3f3f3; padding:10px; }

.admin-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}

.admin-logo { height:60px; }

.dashboard {
  display:flex;
  gap:10px;
  margin-bottom:12px;
}

.card {
  flex:1;
  background:#fff;
  padding:16px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 0 4px rgba(0,0,0,.1);
  border-top:5px solid green;
}

.big { font-size:28px; font-weight:bold; }

.actions { display:flex; gap:8px; margin-bottom:12px; }

button {
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.doneBtn { background:green; color:#fff; }

.task {
  background:#fff;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  box-shadow:0 0 4px rgba(0,0,0,.1);
  border-left:5px solid green;
}

.task-header { cursor:pointer; }

.small { font-size:13px; color:#555; }

#searchBox {
  width:100%;
  padding:10px;
  margin-bottom:12px;
  border-radius:6px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="admin-header">
  <div style="display:flex;align-items:center;gap:10px;">
    <img src="./logo.jpg" class="admin-logo">
    <h2>Task Viewer (Completed Only)</h2>
  </div>

  <div>
    <input type="date" id="dateFrom">
    to
    <input type="date" id="dateTo">
  </div>
</div>

<div class="dashboard">
  <div class="card">
    <div class="big" id="doneCount">0</div>
    Completed Tasks
  </div>
</div>

<div class="actions">
  <button class="doneBtn" onclick="loadTasks()">🔄 Refresh</button>
</div>

<input id="searchBox" placeholder="Search...">

<div id="taskList"></div>
<div id="pagination"></div>

<script>
const SNAPSHOT_BASE =
"https://raw.githubusercontent.com/RossGab/driva-task-snapshots/main/snapshots";

function getTodayPH() {
  return new Date().toLocaleDateString("en-CA", {
    timeZone:"Asia/Manila"
  });
}

let DATE_FROM = getTodayPH();
let DATE_TO = getTodayPH();

dateFrom.value = DATE_FROM;
dateTo.value = DATE_TO;

let TASKS = [];
let FILTERED = [];
let PAGE = 0;
const PAGE_SIZE = 200;
let SEARCH = "";

/* LOAD */
async function loadTasks() {

  DATE_FROM = dateFrom.value;
  DATE_TO = dateTo.value;

  const keys = getDateKeys(DATE_FROM, DATE_TO);
  let all = [];

  for (const k of keys) {
    try {
      const res = await fetch(`${SNAPSHOT_BASE}/${k}.json`);
      if (!res.ok) continue;

      const data = await res.json();

      const arr = Object.entries(data).map(([id,t]) => ({
        _key:id, ...t
      }));

      all = all.concat(arr);

    } catch {}
  }

  // ✅ ONLY COMPLETED
  TASKS = all.filter(t => t.status === "COMPLETED");

  applyFilters();
  renderDashboard();
}

/* FILTER */
function applyFilters() {
  let t = [...TASKS];

  if (SEARCH) {
    t = t.filter(x =>
      Object.values(x).some(v =>
        String(v).toLowerCase().includes(SEARCH)
      )
    );
  }

  // SORT LATEST FIRST
  t.sort((a,b)=>
    new Date(b.completedAt || b.createdAt || 0)
    - new Date(a.completedAt || a.createdAt || 0)
  );

  FILTERED = t;
  PAGE = 0;

  renderList();
  renderPagination();
}

/* DASHBOARD */
function renderDashboard() {
  doneCount.innerText = TASKS.length;
}

/* LIST */
function renderList() {

  const start = PAGE * PAGE_SIZE;
  const items = FILTERED.slice(start, start+PAGE_SIZE);

  if (!items.length) {
    taskList.innerHTML = "No results";
    return;
  }

  taskList.innerHTML = "";

  items.forEach(t => {

    const div = document.createElement("div");
    div.className = "task";

    div.innerHTML = `
      <div class="task-header">
        <b>${t.CUSTOMERNAME || ""}</b>
        <div class="small">${t.ADDRESS || ""}</div>
        <div class="small">Driver: ${t.driverId || "—"}</div>
      </div>

      <div class="task-details" style="display:none">
        <div class="small"><b>Account:</b> ${t.ACCOUNTNUMBER || ""}</div>
        <div class="small"><b>Meter:</b> ${t.METERNUMBER || ""}</div>
        <div class="small"><b>BA:</b> ${t.BA || ""}</div>
        <div class="small"><b>Job Type:</b> ${t.JOBTYPE || ""}</div>
      </div>
    `;

    const header = div.querySelector(".task-header");
    const details = div.querySelector(".task-details");

    header.onclick = () => {
      details.style.display =
        details.style.display === "none" ? "block" : "none";
    };

    taskList.appendChild(div);
  });
}

/* PAGINATION */
function renderPagination() {
  const total = Math.ceil(FILTERED.length / PAGE_SIZE);

  pagination.innerHTML = `
    <button ${PAGE===0?"disabled":""} onclick="prev()">Prev</button>
    Page ${PAGE+1} / ${total}
    <button ${PAGE>=total-1?"disabled":""} onclick="next()">Next</button>
  `;
}

function prev(){ PAGE--; renderList(); renderPagination(); }
function next(){ PAGE++; renderList(); renderPagination(); }

/* SEARCH */
searchBox.oninput = e => {
  SEARCH = e.target.value.toLowerCase();
  applyFilters();
};

/* DATE */
function getDateKeys(from,to){
  const arr=[];
  let d=new Date(from);
  const end=new Date(to);

  while(d<=end){
    arr.push(d.toISOString().slice(0,10).replace(/-/g,""));
    d.setDate(d.getDate()+1);
  }
  return arr;
}

/* INIT */
loadTasks();
</script>

</body>
</html>
