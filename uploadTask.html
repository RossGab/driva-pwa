<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Upload Tasks</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f4f4f4;
}
.container {
  background: #fff;
  padding: 20px;
  border-radius: 8px;
}
button {
  padding: 12px;
  margin-top: 10px;
  width: 100%;
  font-size: 14px;
}
#status {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <h2>📤 Upload Extracted File</h2>

  <input type="file" id="fileInput" accept=".json">
  <button onclick="loadFile()">📂 Load File</button>

  <button onclick="uploadToFirebase()">🚀 Upload to Firebase</button>

  <div id="status"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 SAME CONFIG AS DRIVER
const firebaseConfig = {
  apiKey: "AIzaSyDFW61pnwLvh6HGKWt10zLYNr860fI8vkg",
  authDomain: "driva-pwa.firebaseapp.com",
  databaseURL: "https://driva-pwa-default-rtdb.firebaseio.com",
  projectId: "driva-pwa",
  storageBucket: "driva-pwa.firebasestorage.app",
  messagingSenderId: "299138219722",
  appId: "1:299138219722:web:623ff6b0a067ea822dfe33"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let parsedData = [];

/* =========================
   LOAD FILE
========================= */
window.loadFile = function () {
  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Select a JSON file first");
    return;
  }

  const reader = new FileReader();

  reader.onload = e => {
    try {
      parsedData = JSON.parse(e.target.result);

      document.getElementById("status").innerText =
        `✅ Loaded ${parsedData.length} records`;

      console.log(parsedData);

    } catch (err) {
      alert("Invalid JSON file");
    }
  };

  reader.readAsText(file);
};

/* =========================
   UPLOAD TO FIREBASE
========================= */
window.uploadToFirebase = async function () {

  if (!parsedData.length) {
    alert("No data loaded!");
    return;
  }

  const statusEl = document.getElementById("status");
  statusEl.innerText = "⏳ Uploading...";

  let success = 0;
  let failed = 0;

  for (let i = 0; i < parsedData.length; i++) {

    try {
      const item = parsedData[i];

      // 🔥 GENERATE TASK KEY (same format style)
      const taskKey =
        item._key ||
        `TASK_${Date.now()}_${Math.floor(Math.random()*1000)}`;

      // 🔥 DATE KEY REQUIRED (same as driver logic)
      let dateKey = item.dateKey;

      if (!dateKey) {
        const today = new Date().toISOString().slice(0,10).replace(/-/g,"");
        dateKey = today;
      }

      const cleanData = {
        ...item,
        _key: taskKey,
        dateKey: dateKey,
        status: "PENDING",
        createdAt: new Date().toISOString()
      };

      // =========================
      // ✅ SAVE MAIN TASK
      // =========================
      await set(ref(db, `tasks/${taskKey}`), cleanData);

      // =========================
      // ✅ SAVE DATE INDEX (CRITICAL)
      // =========================
      await set(ref(db, `tasksByDate/${dateKey}/${taskKey}`), true);

      success++;

    } catch (err) {
      console.error("Upload error:", err);
      failed++;
    }
  }

  statusEl.innerText =
    `✅ Done!\nSuccess: ${success} | Failed: ${failed}`;
};
</script>

</body>
</html>
