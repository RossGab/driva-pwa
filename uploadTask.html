<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload Extracted File</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #eef2f7, #dfe6ed);
  margin: 0;
  padding: 20px;
}

/* ===== BACK BUTTON ===== */
#backBtn {
  position: fixed;
  top: 12px;
  left: 12px;
  padding: 10px 14px;
  border-radius: 10px;
  background: #2c3e50;
  color: #fff;
  border: none;
  font-size: 14px;
  z-index: 9999;
  cursor: pointer;
}
#backBtn:hover {
  background: #1a252f;
}

/* ===== CONTAINER ===== */
.container {
  max-width: 600px;
  margin: auto;
  background: #fff;
  padding: 20px;
  border-radius: 14px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

/* ===== HEADER ===== */
h2 {
  margin-top: 0;
  text-align: center;
}

/* ===== INPUT ===== */
input[type="file"] {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* ===== BUTTONS ===== */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

.load { background:#3498db; color:#fff; }
.preview { background:#f39c12; color:#fff; }
.upload { background:#2ecc71; color:#fff; }

button:hover {
  opacity: 0.9;
  transform: translateY(-1px);
}

/* ===== PROGRESS ===== */
#progressBar {
  width: 100%;
  height: 18px;
  background: #e0e0e0;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 14px;
}

#progressFill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #2ecc71, #27ae60);
  transition: width 0.3s;
}

/* ===== STATUS ===== */
#status {
  margin-top: 12px;
  font-size: 14px;
  line-height: 1.6;
  background: #f9f9f9;
  padding: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<!-- ✅ BACK BUTTON -->
<button id="backBtn">← Back</button>

<div class="container">
  <h2>📤 Upload Extracted File v2.0</h2>

  <input type="file" id="fileInput" accept=".json">

  <button class="load" onclick="loadFile()">📂 Load File</button>
  <button class="preview" onclick="previewData()">👁 Preview</button>
  <button class="upload" onclick="uploadData()">🚀 Upload to Firebase</button>

  <div id="progressBar">
    <div id="progressFill"></div>
  </div>

  <div id="status">Waiting for file...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

/* ===== FIREBASE ===== */
const firebaseConfig = {
  apiKey: "AIzaSyDFW61pnwLvh6HGKWt10zLYNr860fI8vkg",
  authDomain: "driva-pwa.firebaseapp.com",
  databaseURL: "https://driva-pwa-default-rtdb.firebaseio.com",
  projectId: "driva-pwa",
  storageBucket: "driva-pwa.firebasestorage.app",
  messagingSenderId: "299138219722",
  appId: "1:299138219722:web:623ff6b0a067ea822dfe33"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

let tasks = [];
let photos = [];

/* ===== BACK BUTTON ===== */
document.getElementById("backBtn").onclick = () => {
  if (confirm("Go back to Assign page?")) {
    window.location.href = "https://rossgab.github.io/driva-pwa/assign.html";
  }
};

/* ===== UTIL ===== */
function log(msg) {
  console.log(msg);
  document.getElementById("status").innerHTML = msg;
}

function updateProgress(current, total) {
  const percent = Math.floor((current / total) * 100);
  document.getElementById("progressFill").style.width = percent + "%";
}

/* ===== LOAD FILE ===== */
window.loadFile = function() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Select a file");

  const reader = new FileReader();

  reader.onload = e => {
    try {
      const raw = JSON.parse(e.target.result);
      tasks = raw.tasks || [];
      photos = raw.photos || [];

      log(`✅ Loaded ${tasks.length} tasks, ${photos.length} photos`);
    } catch (err) {
      alert("Invalid JSON");
    }
  };

  reader.readAsText(file);
};

/* ===== PREVIEW ===== */
window.previewData = function() {
  if (!tasks.length) return alert("No tasks loaded");
  alert(`Loaded ${tasks.length} tasks`);
};

/* ===== BASE64 ===== */
function base64ToBlob(base64) {
  const parts = base64.split(",");
  const mime = parts[0].match(/:(.*?);/)[1];
  const bstr = atob(parts[1]);
  const u8arr = new Uint8Array(bstr.length);

  for (let i = 0; i < bstr.length; i++) {
    u8arr[i] = bstr.charCodeAt(i);
  }

  return new Blob([u8arr], { type: mime });
}

/* ===== UPLOAD ===== */
window.uploadData = async function() {

  if (!tasks.length) return alert("No data loaded");

  let total = tasks.length + photos.length;
  let current = 0;

  log("🚀 Starting upload...");

  /* TASKS */
  for (const t of tasks) {
    current++;
    updateProgress(current, total);

    const snap = await get(ref(db, `tasks/${t._key}`));
    const existing = snap.val();

    if (!existing) {
      await update(ref(db, `tasks/${t._key}`), t);
      await update(ref(db, `tasksByDate/${t.dateKey}/${t._key}`), true);
    } else {
      await update(ref(db, `tasks/${t._key}`), t);
    }
  }

  /* PHOTOS */
  for (const p of photos) {
    current++;
    updateProgress(current, total);

    const blob = base64ToBlob(p.base64);

    const filename = `photo_${p.photoIndex}_${Date.now()}.jpg`;
    const storageRef = sRef(storage, `tasks/${p.taskKey}/${filename}`);

    await uploadBytes(storageRef, blob);
    const url = await getDownloadURL(storageRef);

    await update(ref(db, `tasks/${p.taskKey}`), {
      [`photo${p.photoIndex}Url`]: url,
      [`photo${p.photoIndex}TakenAt`]: p.takenAt,
      ...(p.deliveryData || {}),
      status: "COMPLETED"
    });
  }

  log("✅ Upload Complete!");
};
</script>

</body>
</html>
