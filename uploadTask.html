<style>
body {
  font-family: "Segoe UI", Arial, sans-serif;
  background: #eef2f5;
  margin: 0;
  padding: 16px;
}

.container {
  max-width: 520px;
  margin: auto;
  background: #fff;
  padding: 20px;
  border-radius: 14px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

h2 {
  margin-top: 0;
  font-size: 20px;
  text-align: center;
}

.file-box {
  border: 2px dashed #ccc;
  padding: 16px;
  border-radius: 10px;
  text-align: center;
  margin-bottom: 10px;
  background: #fafafa;
}

.file-name {
  font-size: 13px;
  color: #555;
  margin-top: 6px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.load { background:#3498db; color:#fff; }
.preview { background:#f39c12; color:#fff; }
.upload { background:#2ecc71; color:#fff; }

button:hover:not(:disabled) {
  transform: scale(1.02);
}

#progressBar {
  width:100%;
  height:18px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin-top:15px;
}

#progressFill {
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#2ecc71,#27ae60);
  transition:width 0.3s;
}

#progressText {
  text-align:center;
  font-size:12px;
  margin-top:4px;
  color:#333;
}

#status {
  margin-top:15px;
  font-size:13px;
  background:#111;
  color:#0f0;
  padding:10px;
  border-radius:8px;
  height:140px;
  overflow:auto;
  font-family: monospace;
}
</style>
