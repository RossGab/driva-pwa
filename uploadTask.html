<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload Extracted File</title>

<style>
body { font-family: Arial; background:#f3f3f3; padding:10px; }
.container {
  max-width:600px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
}
button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
}
.load { background:#3498db; color:#fff; }
.preview { background:#f39c12; color:#fff; }
.upload { background:#2ecc71; color:#fff; }

#progressBar {
  width:100%;
  height:20px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}
#progressFill {
  height:100%;
  width:0%;
  background:#2ecc71;
  transition:width 0.3s;
}

#status {
  margin-top:10px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">
  <h2>📤 Upload Extracted File</h2>

  <input type="file" id="fileInput" accept=".json">

  <button class="load" onclick="loadFile()">📂 Load File</button>
  <button class="preview" onclick="previewData()">👁 Preview</button>
  <button class="upload" onclick="uploadData()">🚀 Upload to Firebase</button>

  <div id="progressBar">
    <div id="progressFill"></div>
  </div>

  <div id="status"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = { /* SAME CONFIG */ };

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

let tasks = [];
let photos = [];

window.loadFile = function() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Select a file");

  const reader = new FileReader();
  reader.onload = e => {
    const raw = JSON.parse(e.target.result);
    tasks = raw.tasks || [];
    photos = raw.photos || [];

    status(`✅ Loaded ${tasks.length} tasks, ${photos.length} photos`);
  };
  reader.readAsText(file);
};

window.previewData = function() {
  if (!tasks.length) return alert("No tasks");
  alert(`Preview: ${tasks.length} tasks`);
};

function status(msg) {
  document.getElementById("status").innerHTML = msg;
}

function updateProgress(current, total) {
  const percent = Math.floor((current / total) * 100);
  document.getElementById("progressFill").style.width = percent + "%";
}

function base64ToBlob(base64) {
  const parts = base64.split(",");
  const mime = parts[0].match(/:(.*?);/)[1];
  const bstr = atob(parts[1]);
  let n = bstr.length;
  const u8arr = new Uint8Array(n);
  while (n--) u8arr[n] = bstr.charCodeAt(n);
  return new Blob([u8arr], { type: mime });
}

window.uploadData = async function() {

  if (!tasks.length) return alert("No data");

  let totalSteps = tasks.length + photos.length;
  let currentStep = 0;

  let saved = 0;
  let skipped = 0;
  let photoSkipped = 0;

  // ======================
  // TASKS
  // ======================
  for (const t of tasks) {
    currentStep++;
    updateProgress(currentStep, totalSteps);

    status(`📄 Processing Task: ${t._key}`);

    const snap = await get(ref(db, `tasks/${t._key}`));

    // 🔥 SKIP DUPLICATE
    if (snap.exists()) {
      skipped++;
      continue;
    }

    await update(ref(db, `tasks/${t._key}`), t);
    await update(ref(db, `tasksByDate/${t.dateKey}/${t._key}`), true);

    saved++;
  }

  // ======================
  // PHOTOS
  // ======================
  for (const p of photos) {
    currentStep++;
    updateProgress(currentStep, totalSteps);

    status(`📸 Processing Photo: ${p.taskKey} (${p.photoIndex})`);

    const taskSnap = await get(ref(db, `tasks/${p.taskKey}`));
    const task = taskSnap.val() || {};

    // 🔥 SKIP IF PHOTO EXISTS
    if (task[`photo${p.photoIndex}Url`]) {
      photoSkipped++;
      continue;
    }

    const blob = base64ToBlob(p.base64);
    const filename = `photo_${p.photoIndex}_${Date.now()}.jpg`;

    const storageRef = sRef(storage, `tasks/${p.taskKey}/${filename}`);
    await uploadBytes(storageRef, blob);
    const url = await getDownloadURL(storageRef);

    await update(ref(db, `tasks/${p.taskKey}`), {
      [`photo${p.photoIndex}Url`]: url,
      [`photo${p.photoIndex}TakenAt`]: p.takenAt,
      ...(p.deliveryData || {}),
      status: "COMPLETED"
    });
  }

  // ======================
  // FINAL STATUS
  // ======================
  status(`
    ✅ Upload Complete<br><br>
    📄 Tasks Saved: ${saved}<br>
    ⏭ Skipped (existing): ${skipped}<br>
    📸 Photos Skipped: ${photoSkipped}
  `);
};
</script>

</body>
</html>
