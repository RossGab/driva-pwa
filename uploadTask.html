<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload Extracted File</title>

<style>
body { font-family: Arial; background:#f3f3f3; padding:10px; }
.container {
  max-width:600px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
}
button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
}
.load { background:#3498db; color:#fff; }
.preview { background:#f39c12; color:#fff; }
.upload { background:#2ecc71; color:#fff; }
#previewBox {
  margin-top:15px;
  max-height:300px;
  overflow:auto;
  background:#fafafa;
  padding:10px;
  border-radius:6px;
  font-size:13px;
}
</style>
</head>

<body>

<div class="container">
  <h2>📤 Upload Extracted File</h2>

  <input type="file" id="fileInput" accept=".json">

  <button class="load" onclick="loadFile()">📂 Load File</button>
  <button class="preview" onclick="previewData()">👁 Preview</button>
  <button class="upload" onclick="uploadData()">🚀 Upload to Firebase</button>

  <div id="status"></div>
  <div id="previewBox"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "driva-pwa.firebaseapp.com",
  databaseURL: "https://driva-pwa-default-rtdb.firebaseio.com",
  projectId: "driva-pwa",
  storageBucket: "driva-pwa.firebasestorage.app",
  messagingSenderId: "299138219722",
  appId: "1:299138219722:web:623ff6b0a067ea822dfe33"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

let tasks = [];
let photos = [];

/* =========================
   LOAD FILE
========================= */
window.loadFile = function() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Select a file");

  const reader = new FileReader();

  reader.onload = e => {
    try {
      const raw = JSON.parse(e.target.result);

      // ✅ YOUR FORMAT
      tasks = raw.tasks || [];
      photos = raw.photos || [];

      document.getElementById("status").innerHTML =
        `✅ Loaded ${tasks.length} tasks, ${photos.length} photos`;

    } catch {
      alert("Invalid JSON");
    }
  };

  reader.readAsText(file);
};

/* =========================
   PREVIEW
========================= */
window.previewData = function() {
  const box = document.getElementById("previewBox");

  if (!tasks.length) return alert("No tasks");

  box.innerHTML = "";

  tasks.slice(0, 5).forEach(t => {
    box.innerHTML += `
      <b>${t.CUSTOMERNAME}</b><br>
      Driver: ${t.driverId}<br>
      DateKey: ${t.dateKey}<br>
      Key: ${t._key}
      <hr>
    `;
  });
};

/* =========================
   BASE64 → BLOB
========================= */
function base64ToBlob(base64) {
  const parts = base64.split(",");
  const mime = parts[0].match(/:(.*?);/)[1];
  const bstr = atob(parts[1]);
  let n = bstr.length;
  const u8arr = new Uint8Array(n);

  while (n--) {
    u8arr[n] = bstr.charCodeAt(n);
  }

  return new Blob([u8arr], { type: mime });
}

/* =========================
   UPLOAD
========================= */
window.uploadData = async function() {

  if (!tasks.length) return alert("No data loaded");

  let success = 0;
  let failed = 0;

  for (const t of tasks) {
    try {
      if (!t._key) {
        failed++;
        continue;
      }

      // 1️⃣ SAVE TASK
      await update(ref(db, `tasks/${t._key}`), t);

      // 2️⃣ SAVE INDEX
      await update(ref(db, `tasksByDate/${t.dateKey}/${t._key}`), true);

      success++;

    } catch (err) {
      console.error(err);
      failed++;
    }
  }

  // =========================
  // 📸 UPLOAD PHOTOS
  // =========================
  for (const p of photos) {
    try {

      if (!p.base64) continue;

      const blob = base64ToBlob(p.base64);

      const filename = `photo_${p.photoIndex}_${Date.now()}.jpg`;
      const storageRef = sRef(storage, `tasks/${p.taskKey}/${filename}`);

      await uploadBytes(storageRef, blob);
      const url = await getDownloadURL(storageRef);

      // ✅ LINK TO TASK
      await update(ref(db, `tasks/${p.taskKey}`), {
        [`photo${p.photoIndex}Url`]: url,
        [`photo${p.photoIndex}TakenAt`]: p.takenAt,
        ...(p.deliveryData || {}),
        status: "COMPLETED"
      });

    } catch (err) {
      console.error("Photo upload failed", err);
    }
  }

  document.getElementById("status").innerHTML =
    `✅ Upload Done | Success: ${success} | Failed: ${failed}`;
};
</script>

</body>
</html>
