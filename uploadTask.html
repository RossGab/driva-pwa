<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload Extracted File</title>

<style>
body {
  font-family: "Segoe UI", Arial, sans-serif;
  background: #f4f6f9;
  margin: 0;
  padding: 20px;
}

/* ===== HEADER ===== */
.header {
  text-align: center;
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 20px;
}

/* ===== BACK BUTTON ===== */
#backBtn {
  background: #555;
  color: #fff;
  border: none;
  padding: 10px 16px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 12px;
}
#backBtn:hover {
  background: #333;
}

/* ===== CARD STYLE (MATCH ADMIN) ===== */
.card {
  background: #fff;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

/* ===== SECTION TITLE ===== */
.section-title {
  font-weight: bold;
  font-size: 16px;
  margin-bottom: 10px;
}

/* ===== FILE ROW ===== */
.file-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

/* ===== INPUT ===== */
input[type="file"] {
  padding: 8px;
}

/* ===== BUTTONS ===== */
button {
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.load { background:#28a745; color:#fff; }
.preview { background:#6c757d; color:#fff; }
.upload { background:#007bff; color:#fff; }

button:hover:not(:disabled) {
  opacity: 0.9;
}

/* ===== PROGRESS ===== */
#progressBar {
  width:100%;
  height:14px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

#progressFill {
  height:100%;
  width:0%;
  background:#28a745;
  transition:width 0.3s;
}

#progressText {
  font-size:12px;
  text-align:center;
  margin-top:4px;
  color:#555;
}

/* ===== DEBUG TERMINAL ===== */
#status {
  margin-top:15px;
  font-size:12px;
  background:#111;
  color:#00ff9c;
  padding:12px;
  border-radius:10px;
  height:160px;
  overflow:auto;
  font-family: monospace;
}
</style>
</head>

<body>

<div class="header">Upload Extracted File</div>

<button id="backBtn">← Back</button>

<!-- ===== BULK UPLOAD CARD ===== -->
<div class="card">
  <div class="section-title">📥 Bulk Upload Extracted File</div>

  <div class="file-row">
    <input type="file" id="fileInput" accept=".json">
    <span id="fileName">No file chosen</span>
  </div>

  <div class="file-row" style="margin-top:10px;">
    <button class="load" onclick="loadFile()">Load</button>
    <button class="preview" onclick="previewData()">Preview</button>
    <button class="upload" onclick="uploadData()">Upload</button>
  </div>

  <div id="progressBar">
    <div id="progressFill"></div>
  </div>
  <div id="progressText">0%</div>
</div>

<!-- ===== DEBUG PANEL ===== -->
<div class="card">
  <div class="section-title">🧪 Upload Logs</div>
  <div id="status">Ready...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyDFW61pnwLvh6HGKWt10zLYNr860fI8vkg",
  authDomain: "driva-pwa.firebaseapp.com",
  databaseURL: "https://driva-pwa-default-rtdb.firebaseio.com",
  projectId: "driva-pwa",
  storageBucket: "driva-pwa.firebasestorage.app",
  messagingSenderId: "299138219722",
  appId: "1:299138219722:web:623ff6b0a067ea822dfe33"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

let tasks = [];
let photos = [];

/* BACK */
document.getElementById("backBtn").onclick = () => {
  window.location.href = "https://rossgab.github.io/driva-pwa/assign.html";
};

/* LOG */
function log(msg) {
  const el = document.getElementById("status");
  el.innerHTML += msg + "<br>";
  el.scrollTop = el.scrollHeight;
}

function updateProgress(current, total) {
  const percent = Math.floor((current / total) * 100);
  document.getElementById("progressFill").style.width = percent + "%";
  document.getElementById("progressText").innerText = percent + "%";
}

/* FILE NAME */
document.getElementById("fileInput").addEventListener("change", e => {
  const file = e.target.files[0];
  document.getElementById("fileName").innerText =
    file ? file.name : "No file chosen";
});

/* LOAD */
window.loadFile = function() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Select a file");

  const reader = new FileReader();

  reader.onload = e => {
    try {
      const raw = JSON.parse(e.target.result);
      tasks = raw.tasks || [];
      photos = raw.photos || [];

      document.getElementById("status").innerHTML = "";
      log(`✅ Loaded ${tasks.length} tasks`);
      log(`📸 Loaded ${photos.length} photos`);
    } catch (err) {
      alert("Invalid JSON");
    }
  };

  reader.readAsText(file);
};

/* PREVIEW */
window.previewData = function() {
  if (!tasks.length) return alert("No tasks loaded");
  alert(`Loaded ${tasks.length} tasks\n${photos.length} photos`);
};

/* BASE64 */
function base64ToBlob(base64) {
  const parts = base64.split(",");
  const mime = parts[0].match(/:(.*?);/)[1];
  const bstr = atob(parts[1]);
  const u8arr = new Uint8Array(bstr.length);

  for (let i = 0; i < bstr.length; i++) {
    u8arr[i] = bstr.charCodeAt(i);
  }

  return new Blob([u8arr], { type: mime });
}

/* UPLOAD (UNCHANGED) */
window.uploadData = async function() {

  if (!tasks.length) return alert("No data loaded");

  document.getElementById("status").innerHTML = "";
  log("🚀 Starting upload...");

  let total = tasks.length + photos.length;
  let current = 0;

  let saved = 0;
  let updated = 0;
  let skipped = 0;
  let photoSkipped = 0;

  for (const t of tasks) {
    current++;
    updateProgress(current, total);

    log(`📄 ${t._key}`);

    try {
      const snap = await get(ref(db, `tasks/${t._key}`));
      const existing = snap.val();

      if (
        existing &&
        existing.status === "COMPLETED" &&
        existing.photo1Url
      ) {
        skipped++;
        continue;
      }

      if (!existing) {
        await update(ref(db, `tasks/${t._key}`), t);
        await update(ref(db, `tasksByDate/${t.dateKey}/${t._key}`), true);
        saved++;
      } else {
        await update(ref(db, `tasks/${t._key}`), t);
        updated++;
      }

    } catch (err) {
      console.error(err);
    }
  }

  for (const p of photos) {
    current++;
    updateProgress(current, total);

    log(`📸 ${p.taskKey} (P${p.photoIndex})`);

    try {
      const taskSnap = await get(ref(db, `tasks/${p.taskKey}`));
      const task = taskSnap.val() || {};

      if (task[`photo${p.photoIndex}Url`]) {
        photoSkipped++;
        continue;
      }

      const blob = base64ToBlob(p.base64);

      const filename = `photo_${p.photoIndex}_${Date.now()}.jpg`;
      const storageRef = sRef(storage, `tasks/${p.taskKey}/${filename}`);

      await uploadBytes(storageRef, blob);
      const url = await getDownloadURL(storageRef);

      await update(ref(db, `tasks/${p.taskKey}`), {
        [`photo${p.photoIndex}Url`]: url,
        [`photo${p.photoIndex}TakenAt`]: p.takenAt,
        ...(p.deliveryData || {}),
        status: "COMPLETED"
      });

    } catch (err) {
      console.error(err);
    }
  }

  log("<br>✅ DONE");
  log(`🆕 Saved: ${saved}`);
  log(`🔄 Updated: ${updated}`);
  log(`⏭ Skipped: ${skipped}`);
  log(`📸 Photo Skipped: ${photoSkipped}`);
};
</script>

</body>
</html>
