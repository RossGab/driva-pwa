<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload Extracted File</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f9;
  margin: 0;
  padding: 20px;
}

/* ===== HEADER ===== */
.header {
  text-align: center;
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 20px;
}

/* ===== BACK BUTTON ===== */
#backBtn {
  background: #555;
  color: #fff;
  border: none;
  padding: 10px 16px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 10px;
}
#backBtn:hover {
  background: #333;
}

/* ===== CARD ===== */
.card {
  background: #fff;
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

/* ===== INPUT ===== */
input[type="file"] {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* ===== BUTTON GROUP ===== */
.button-group {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 10px;
}

/* ===== BUTTONS ===== */
button.action {
  padding: 12px 14px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  min-width: 140px;
}

/* MATCH ADMIN COLORS */
.load { background:#28a745; color:#fff; }
.preview { background:#6c757d; color:#fff; }
.upload { background:#007bff; color:#fff; }

button.action:hover {
  opacity: 0.9;
}

/* ===== PROGRESS ===== */
#progressBar {
  width: 100%;
  height: 16px;
  background: #e0e0e0;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 12px;
}

#progressFill {
  height: 100%;
  width: 0%;
  background: #28a745;
  transition: width 0.3s;
}

/* ===== STATUS ===== */
#status {
  margin-top: 10px;
  font-size: 13px;
  color: #555;
  line-height: 1.6;
}
</style>
</head>

<body>

<div class="header">📤 Upload Extracted File</div>

<button id="backBtn">← Back</button>

<!-- ===== CARD ===== -->
<div class="card">

  <b>📁 Select Extracted JSON File</b><br><br>

  <input type="file" id="fileInput" accept=".json">

  <div class="button-group">
    <button class="action load" onclick="loadFile()">📂 Load</button>
    <button class="action preview" onclick="previewData()">👁 Preview</button>
    <button class="action upload" onclick="uploadData()">🚀 Upload</button>
  </div>

  <div id="progressBar">
    <div id="progressFill"></div>
  </div>

  <div id="status">Waiting for file...</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

/* ===== FIREBASE ===== */
const firebaseConfig = {
  apiKey: "AIzaSyDFW61pnwLvh6HGKWt10zLYNr860fI8vkg",
  authDomain: "driva-pwa.firebaseapp.com",
  databaseURL: "https://driva-pwa-default-rtdb.firebaseio.com",
  projectId: "driva-pwa",
  storageBucket: "driva-pwa.firebasestorage.app",
  messagingSenderId: "299138219722",
  appId: "1:299138219722:web:623ff6b0a067ea822dfe33"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

let tasks = [];
let photos = [];

/* ===== BACK BUTTON ===== */
document.getElementById("backBtn").onclick = () => {
  window.location.href = "https://rossgab.github.io/driva-pwa/assign.html";
};

/* ===== UTIL ===== */
function log(msg) {
  document.getElementById("status").innerHTML = msg;
}

function updateProgress(current, total) {
  const percent = Math.floor((current / total) * 100);
  document.getElementById("progressFill").style.width = percent + "%";
}

/* ===== LOAD FILE ===== */
window.loadFile = function() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Select a file");

  const reader = new FileReader();

  reader.onload = e => {
    try {
      const raw = JSON.parse(e.target.result);
      tasks = raw.tasks || [];
      photos = raw.photos || [];

      log(`✅ Loaded ${tasks.length} tasks, ${photos.length} photos`);
    } catch {
      alert("Invalid JSON");
    }
  };

  reader.readAsText(file);
};

/* ===== PREVIEW ===== */
window.previewData = function() {
  if (!tasks.length) return alert("No tasks loaded");
  alert(`Loaded ${tasks.length} tasks`);
};

/* ===== BASE64 ===== */
function base64ToBlob(base64) {
  const parts = base64.split(",");
  const mime = parts[0].match(/:(.*?);/)[1];
  const bstr = atob(parts[1]);
  const u8arr = new Uint8Array(bstr.length);

  for (let i = 0; i < bstr.length; i++) {
    u8arr[i] = bstr.charCodeAt(i);
  }

  return new Blob([u8arr], { type: mime });
}

/* ===== UPLOAD ===== */
window.uploadData = async function() {

  if (!tasks.length) return alert("No data loaded");

  let total = tasks.length + photos.length;
  let current = 0;

  log("🚀 Uploading...");

  for (const t of tasks) {
    current++;
    updateProgress(current, total);

    const snap = await get(ref(db, `tasks/${t._key}`));
    const existing = snap.val();

    if (!existing) {
      await update(ref(db, `tasks/${t._key}`), t);
      await update(ref(db, `tasksByDate/${t.dateKey}/${t._key}`), true);
    } else {
      await update(ref(db, `tasks/${t._key}`), t);
    }
  }

  for (const p of photos) {
    current++;
    updateProgress(current, total);

    const blob = base64ToBlob(p.base64);
    const filename = `photo_${p.photoIndex}_${Date.now()}.jpg`;

    const storageRef = sRef(storage, `tasks/${p.taskKey}/${filename}`);
