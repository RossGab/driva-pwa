<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Extracted Tasks</title>

<style>
body {
  font-family: Arial;
  background:#f4f4f4;
  padding:20px;
}

.container {
  max-width:600px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
}

h2 {
  text-align:center;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  font-size:14px;
  cursor:pointer;
}

.load { background:#3498db; color:#fff; }
.upload { background:#2ecc71; color:#fff; }
.preview { background:#f39c12; color:#fff; }

#status {
  margin-top:10px;
  font-weight:bold;
}

.preview-box {
  margin-top:15px;
  max-height:300px;
  overflow:auto;
  background:#fafafa;
  padding:10px;
  border-radius:6px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<h2>📤 Upload Extracted File</h2>

<input type="file" id="fileInput" accept=".json">

<button class="load" onclick="loadFile()">📂 Load File</button>
<button class="preview" onclick="previewData()">👁 Preview</button>
<button class="upload" onclick="uploadToFirebase()">🚀 Upload to Firebase</button>

<div id="status">No file loaded</div>
<div id="preview" class="preview-box"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// 🔥 SAME CONFIG AS DRIVER
const firebaseConfig = {
  apiKey: "AIzaSyDFW61pnwLvh6HGKWt10zLYNr860fI8vkg",
  authDomain: "driva-pwa.firebaseapp.com",
  databaseURL: "https://driva-pwa-default-rtdb.firebaseio.com",
  projectId: "driva-pwa",
  storageBucket: "driva-pwa.firebasestorage.app",
  messagingSenderId: "299138219722",
  appId: "1:299138219722:web:623ff6b0a067ea822dfe33"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let parsedData = [];

// ============================
// 📂 LOAD FILE
// ============================
window.loadFile = function () {

  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Select a JSON file first");
    return;
  }

  const reader = new FileReader();

  reader.onload = e => {
    try {
      const raw = JSON.parse(e.target.result);

      // 🔥 HANDLE BOTH FORMATS
      if (Array.isArray(raw)) {
        parsedData = raw;
      } else {
        parsedData = Object.entries(raw).map(([key, value]) => ({
          _key: key,
          ...value
        }));
      }

      document.getElementById("status").innerText =
        `✅ Loaded ${parsedData.length} tasks`;

    } catch (err) {
      console.error(err);
      alert("Invalid JSON file");
    }
  };

  reader.readAsText(file);
};

// ============================
// 👁 PREVIEW
// ============================
window.previewData = function () {

  if (!parsedData.length) {
    alert("Load file first");
    return;
  }

  const preview = parsedData.slice(0, 5).map(t => `
    <div style="margin-bottom:10px;border-bottom:1px solid #ddd;padding-bottom:5px;">
      <b>${t.CUSTOMERNAME || "—"}</b><br>
      ${t.ADDRESS || "—"}<br>
      Driver: ${t.driverId || "—"}<br>
      DateKey: ${t.dateKey || "—"}<br>
      Key: ${t._key}
    </div>
  `).join("");

  document.getElementById("preview").innerHTML = preview;
};

// ============================
// 🚀 UPLOAD
// ============================
window.uploadToFirebase = async function () {

  if (!parsedData.length) {
    alert("No data loaded!");
    return;
  }

  if (!confirm(`Upload ${parsedData.length} tasks?`)) return;

  let success = 0;
  let failed = 0;

  for (const task of parsedData) {

    try {

      // 🔥 VALIDATION
      if (!task._key) {
        console.warn("Missing _key:", task);
        failed++;
        continue;
      }

      if (!task.dateKey) {
        console.warn("Missing dateKey:", task);
        failed++;
        continue;
      }

      if (!task.driverId) {
        console.warn("Missing driverId:", task);
        failed++;
        continue;
      }

      // =========================
      // ✅ SAVE MAIN TASK
      // =========================
      await set(ref(db, `tasks/${task._key}`), task);

      // =========================
      // ✅ LINK TO DATE INDEX (CRITICAL)
      // =========================
      await set(ref(db, `tasksByDate/${task.dateKey}/${task._key}`), true);

      success++;

    } catch (err) {
      console.error("Upload failed:", task._key, err);
      failed++;
    }
  }

  document.getElementById("status").innerText =
    `✅ Upload Done | Success: ${success} | Failed: ${failed}`;

  alert(`Upload finished\nSuccess: ${success}\nFailed: ${failed}`);
};

</script>

</body>
</html>
