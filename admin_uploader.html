<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Manual Upload</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.task{
background:#fff;
padding:15px;
margin-bottom:12px;
border-radius:8px;
border-left:5px solid orange;
}

.topbar{
margin-bottom:20px;
}

select,input{
padding:6px;
margin-right:10px;
}

button{
padding:8px 12px;
margin-top:8px;
}

</style>
</head>

<body>

<h2>Admin Manual Photo Upload</h2>

<div class="topbar">

<label>Date</label>
<input type="date" id="dateFilter">

<label>Driver</label>
<select id="driverFilter">
<option value="">Select Driver</option>
</select>

<button onclick="loadTasks()">Load Tasks</button>

</div>

<div id="taskList">
Select date and driver.
</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";


const firebaseConfig = {
apiKey: "AIzaSyDFW61pnwLvh6HGKWt10zLYNr860fI8vkg",
authDomain: "driva-pwa.firebaseapp.com",
databaseURL: "https://driva-pwa-default-rtdb.firebaseio.com",
projectId: "driva-pwa",
storageBucket: "driva-pwa.firebasestorage.app",
messagingSenderId: "299138219722",
appId: "1:299138219722:web:623ff6b0a067ea822dfe33"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

const taskList = document.getElementById("taskList");
const driverFilter = document.getElementById("driverFilter");

let ALL_TASKS = {};

document.getElementById("dateFilter").value =
new Date().toLocaleDateString("en-CA",{timeZone:"Asia/Manila"});


async function loadTasks(){

const date = document.getElementById("dateFilter").value;
const driver = driverFilter.value;

if(!date){
alert("Select date");
return;
}

taskList.innerHTML="Loading...";

const dateKey = date.replace(/-/g,"");

const snap = await get(ref(db,`tasksByDate/${dateKey}`));

if(!snap.exists()){
taskList.innerHTML="No tasks";
return;
}

const ids = Object.keys(snap.val());

ALL_TASKS={};

const drivers = new Set();

for(const id of ids){

const s = await get(ref(db,`tasks/${id}`));

if(!s.exists()) continue;

const t = s.val();

/* SHOW ONLY PENDING */
if(t.status !== "PENDING") continue;

ALL_TASKS[id]=t;

if(t.driverId){
drivers.add(t.driverId);
}

}

buildDriverList(drivers);

if(!driver){
taskList.innerHTML="Select driver";
return;
}

renderTasks();

}



function buildDriverList(drivers){

driverFilter.innerHTML=`<option value="">Select Driver</option>`;

drivers.forEach(d=>{

const opt=document.createElement("option");

opt.value=d;
opt.textContent=d;

driverFilter.appendChild(opt);

});

}



driverFilter.addEventListener("change",renderTasks);



function renderTasks(){

const driver = driverFilter.value;

if(!driver){
taskList.innerHTML="Select driver";
return;
}

taskList.innerHTML="";

for(const id in ALL_TASKS){

const t = ALL_TASKS[id];

if(t.driverId !== driver) continue;

renderTask(id,t);

}

}



async function renderTask(id,t){

const div=document.createElement("div");

div.className="task";

div.setAttribute("data-task",id);

div.innerHTML=`

<b>${t.CUSTOMERNAME || ""}</b>
<div>${t.ADDRESS || ""}</div>

<div id="delivery_${id}">
Loading delivery methods...
</div>

<input type="file" multiple accept="image/*" id="file_${id}">

<button onclick="uploadTask('${id}')">
Upload Photos
</button>

`;

taskList.appendChild(div);

loadDeliveryMethods(id,t.JOBTYPE);

}



async function loadDeliveryMethods(taskKey,jobType){

const snap =
await get(ref(db,`config/driverUI/jobTypes/${jobType}/deliveryMethods`));

if(!snap.exists()){
document.getElementById(`delivery_${taskKey}`).innerHTML="";
return;
}

const methods = snap.val();

let html="<b>Delivery Method</b><br>";

for(const m in methods){

html+=`
<label>
<input type="radio" name="delivery_${taskKey}" value="${m}">
${m}
</label><br>
`;

}

document.getElementById(`delivery_${taskKey}`).innerHTML=html;

}



window.uploadTask = async function(taskKey){

const input=document.getElementById(`file_${taskKey}`);

if(!input.files.length){
alert("Select photos first");
return;
}

const deliveryType =
document.querySelector(`input[name="delivery_${taskKey}"]:checked`)?.value;

if(!deliveryType){
alert("Select delivery method");
return;
}

let index=1;

for(const file of input.files){

const filename=`admin_${Date.now()}_${index}.jpg`;

const imgRef=sRef(storage,`tasks/${taskKey}/${filename}`);

await uploadBytes(imgRef,file);

const url=await getDownloadURL(imgRef);

await update(ref(db,`tasks/${taskKey}`),{

[`photo${index}Url`]:url,
[`photo${index}Filename`]:filename,
uploadedAt:new Date().toISOString(),
deliveryType:deliveryType

});

index++;

}

await update(ref(db,`tasks/${taskKey}`),{

status:"COMPLETED"

});

alert("Upload complete");

/* REMOVE TASK FROM PAGE */

delete ALL_TASKS[taskKey];

const card=document.querySelector(`[data-task="${taskKey}"]`);

if(card) card.remove();

}



</script>

</body>
</html>
