<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Manual Upload</title>

<style>
body{
  font-family:Arial;
  background:#f4f4f4;
  padding:20px;
}

.task{
  background:#fff;
  padding:15px;
  margin-bottom:12px;
  border-radius:8px;
  border-left:5px solid orange;
}

button{
  padding:8px 12px;
  margin-top:8px;
}

.topbar{
  margin-bottom:20px;
}

select,input{
  padding:6px;
  margin-right:10px;
}
</style>
</head>

<body>

<h2>Admin Manual Photo Upload</h2>

<div class="topbar">

<label>Date:</label>
<input type="date" id="dateFilter">

<label>Driver:</label>
<select id="driverFilter">
<option value="">Select Driver</option>
</select>

<button onclick="loadTasks()">Load Snapshot</button>

</div>

<div id="taskList">Select a driver to load tasks.</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";


const firebaseConfig = {
  apiKey: "AIzaSyDFW61pnwLvh6HGKWt10zLYNr860fI8vkg",
  authDomain: "driva-pwa.firebaseapp.com",
  databaseURL: "https://driva-pwa-default-rtdb.firebaseio.com",
  projectId: "driva-pwa",
  storageBucket: "driva-pwa.firebasestorage.app",
  messagingSenderId: "299138219722",
  appId: "1:299138219722:web:623ff6b0a067ea822dfe33"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

const taskList = document.getElementById("taskList");
const driverFilter = document.getElementById("driverFilter");

let SNAPSHOT_TASKS = {};


document.getElementById("dateFilter").value =
new Date().toLocaleDateString("en-CA",{timeZone:"Asia/Manila"});

document.getElementById("dateFilter")
.addEventListener("change", loadTasks);


driverFilter.addEventListener("change", renderDriverTasks);



async function loadTasks(){

  const date = document.getElementById("dateFilter").value.replace(/-/g,"");

  const url =
  `https://raw.githubusercontent.com/RossGab/driva-task-snapshots/main/snapshots/${date}.json`;

  const res = await fetch(url);

  if(!res.ok){
    taskList.innerHTML="Snapshot not found";
    return;
  }

  SNAPSHOT_TASKS = await res.json();

  buildDriverList();

  taskList.innerHTML = "Select a driver to display tasks.";

}



function buildDriverList(){

  const drivers = new Set();

  for(const id in SNAPSHOT_TASKS){
    const t = SNAPSHOT_TASKS[id];
    if(t.driverId){
      drivers.add(t.driverId);
    }
  }

  driverFilter.innerHTML = "";

  const first = document.createElement("option");
  first.value = "";
  first.textContent = "Select Driver";
  driverFilter.appendChild(first);

  drivers.forEach(d=>{
    const opt=document.createElement("option");
    opt.value=d;
    opt.textContent=d;
    driverFilter.appendChild(opt);
  });

}



function renderDriverTasks(){

  const driverId = driverFilter.value;

  if(!driverId){
    taskList.innerHTML="Select a driver.";
    return;
  }

  taskList.innerHTML="";

  for(const id in SNAPSHOT_TASKS){

    const t = SNAPSHOT_TASKS[id];

    if(t.status === "COMPLETED") continue;

    if(t.driverId !== driverId) continue;

    renderTask(id,t);

  }

}



async function renderTask(id,t){

  const div=document.createElement("div");
  div.className="task";

  div.innerHTML=`

  <b>${t.CUSTOMERNAME || "-"}</b>
  <div>${t.ADDRESS || "-"}</div>
  <div><b>Driver:</b> ${t.driverId || "-"}</div>

  <div id="delivery_${id}">
  Loading delivery methods...
  </div>

  <input type="file" multiple accept="image/*" id="file_${id}">

  <button onclick="uploadTask('${id}')">
  Upload Photos
  </button>

  `;

  taskList.appendChild(div);

  loadDeliveryMethods(id,t.JOBTYPE);

}



async function loadDeliveryMethods(taskKey,jobType){

  const snap =
  await get(ref(db,`config/driverUI/jobTypes/${jobType}/deliveryMethods`));

  if(!snap.exists()){
    document.getElementById(`delivery_${taskKey}`).innerHTML="";
    return;
  }

  const methods = snap.val();

  let html="<b>Delivery Method</b><br>";

  for(const m in methods){

    html+=`
    <label>
    <input type="radio" name="delivery_${taskKey}" value="${m}">
    ${m}
    </label><br>
    `;

  }

  document.getElementById(`delivery_${taskKey}`).innerHTML=html;

}



window.uploadTask = async function(taskKey){

  const input=document.getElementById(`file_${taskKey}`);

  if(!input.files.length){
    alert("Select photos first");
    return;
  }

  const deliveryType =
  document.querySelector(`input[name="delivery_${taskKey}"]:checked`)?.value;

  if(!deliveryType){
    alert("Select delivery method");
    return;
  }

  let index=1;

  for(const file of input.files){

    const filename=`admin_${Date.now()}_${index}.jpg`;

    const imgRef=sRef(storage,`tasks/${taskKey}/${filename}`);

    await uploadBytes(imgRef,file);

    const url=await getDownloadURL(imgRef);

    await update(ref(db,`tasks/${taskKey}`),{
      [`photo${index}Url`]:url,
      [`photo${index}Filename`]:filename,
      uploadedAt:new Date().toISOString(),
      deliveryType:deliveryType
    });

    index++;

  }

  await update(ref(db,`tasks/${taskKey}`),{
    status:"COMPLETED"
  });

  alert("Upload complete");

  renderDriverTasks();

}

</script>

</body>
</html>
